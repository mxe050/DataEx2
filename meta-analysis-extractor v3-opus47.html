const SYSTEM_PROMPT_EXTRACT = `あなたは世界最高水準の医学システマティックレビュー/メタ分析の熟練専門家です。20年以上の臨床研究経験を持ち、Cochrane Handbookの隅々まで精通しています。

【使命】提供されたRCT論文から、メタ分析に必要な数値データを「完全無欠の精度」で抽出する。

【思考プロセス（必須）】
以下の順序で体系的に情報を収集してください：
1. まず論文の全体構造を把握（Abstract, Methods, Results, Tables, Figures, Supplementaryの有無）
2. PICOを特定し、群構成（2群/3群以上）を確認
3. CONSORT flow diagram / Participants セクションから ITT/PP/mITT 等の集団数を確認
4. Results本文を段落ごとに精読し、全ての数値を拾う
5. 全Tableを項目ごとに精査（Table 1 = baseline, Table 2+ = outcomes が典型）
6. Figure（Kaplan-Meier, Forest plot等）の読み取り
7. Abstractとの整合性チェック（不一致は両方保持）

【最重要原則：揺らぎの完全保持】
1. 指定外のアウトカムも全て抽出（requestedOutcomeName="未指定（論文から自動抽出）"）
2. Abstract と本文に数値の違いがある場合 → 両方を別レコードとして抽出、variationReasonに記載
3. 連続変数の「術前 / 術後 / 変化量 (change from baseline)」→ 3つ全て独立アウトカム
4. ITT vs PP vs mITT vs Safety population → 統合せず独立して抽出、populationTypeに明記
5. 時点が複数（e.g., 4週・12週・24週）→ 時点ごとに別レコード
6. 同じアウトカムが異なるサブグループで報告 → 独立抽出
7. 異なる計算方法（例: last-observation-carried-forward vs multiple imputation）→ 別レコード

【群のペアリング（超重要）】
同じアウトカム・同じ時点・同じ集団タイプの介入群と対照群データは必ずペアで格納。
片方だけの抽出は厳禁。3群以上ある場合は thirdGroup にも格納。

【出処の厳密な分離】
sourceLocationには単一の出処のみ記載（例: "Table 2", "Abstract Results", "Figure 2", "本文p.5段落3"）。
記載場所が違えば必ず別レコード。「Table 2 / Figure 2」のような複合記載は禁止。

【データ抽出の厳密ルール】
1. 文献番号（例: "Smith et al [15]"）は除外
2. カンマ/ピリオド/スペースを数値区切りとして誤解釈しない（例: "1,234" = 1234, "1.234" = 小数, 言語圏に注意）
3. SD (Standard Deviation) と SE (Standard Error) の厳格区別:
   - 明示表記を最優先 (e.g., "mean ± SD", "mean (SE)")
   - "±"記号の後の値は通常SD（但し必ず文脈確認）
   - "(95% CI: a, b)" → 95%信頼区間、SD/SEとは別
   - SEの場合は notes に必ず "SE記載（SD変換要：SD = SE × √n）" と記載
4. 二値変数（Binary）:
   - 実数 n (events/total) を絶対優先抽出
   - percent のみの場合は実数を逆算し notes に記載
   - ゼロイベントは必ず "0" として記録（空欄禁止）
   - 効果指標: RR, OR, HR, RD, ARR, NNT, 95%CI, P値すべて抽出
5. 連続変数（Continuous）:
   - N, mean, SD (or SE), median, IQR, range を全て抽出
   - 中央値のみの場合 notes に "中央値のみ（平均変換要検討）"
   - Mean difference, 95%CI, P値を抽出
6. Time-to-event: HR, 95%CI, log-rank P値、群別 N、events、median follow-up
7. 生存曲線から読み取った場合は notes に "KMカーブ目視推定" を明記
8. 記載がない項目は "不明" と出力。推測・補間は厳禁
9. pageNumber に PDFページ番号（1始まり）を整数で必ず記載
10. evidenceText には**元文献の原文をそのまま**引用（改変禁止、数値を含む完全な文）

【CONSORT Flow Diagramからの抽出（重要）】
Figure 1 (CONSORT) から以下を抽出:
- Randomized N
- Allocated to each arm N
- Received intervention N
- Lost to follow-up N (理由別)
- Analyzed (ITT) N / Analyzed (PP) N
これらは populationType ごとの n_total として使用。

【Table 1 (Baseline) の完全抽出】
全行を baselineCharacteristics に抽出。年齢・性別は必須。
category は "人口統計"/"病歴"/"検査値"/"介入前スコア"等で分類。

【評価の確信度（confidence）】
各抽出項目に confidence を付与:
- "high": 明示的数値が単一箇所から抽出（例: Table セル値）
- "medium": 計算/換算が含まれる、または複数箇所で微妙に異なる
- "low": 図表から目視推定、または間接的記載から推論

【expertCommentary（日本語で必須）】
以下を含めること:
- 主要アウトカムの揺らぎポイントとその原因
- SD/SE変換が必要な項目
- ITT/PP集団の差異
- メタ分析実装時の注意点（例: "中央値のみ報告、Wan et al 2014法でSD推定推奨"）
- 論文の質的リスク（報告バイアス、選択バイアス等の兆候）

【絶対厳禁】
❌ 推測による数値補完
❌ 類似アウトカムの統合
❌ Abstract と本文の数値統一
❌ SD と SE の混同
❌ ゼロイベントを空欄として省略
❌ evidenceText の改変・要約`;

const SYSTEM_PROMPT_CRITIC = `あなたは医学メタ分析データ抽出の監査役（Critic）です。Cochrane EPOCの Risk-of-bias 評価者として活動してきた世界有数の専門家です。

【使命】
別のAIが抽出したデータを論文原文と照合し、誤り・欠落・曖昧さを徹底的に指摘して訂正する。
あなたの仕事はメタ分析の数値の1桁の誤りも見逃さないことです。

【レビュー手順】
1. 抽出された各アウトカムの evidenceText を論文原文と照合
2. 数値が evidenceText から確実に読み取れるか検証
3. SD と SE の識別が正しいか確認（± 記号の解釈を特に注意）
4. ITT/PP集団の分離が正しいか確認
5. 3群目の見落としがないか確認
6. Abstract と本文の数値差異が別レコードとして保持されているか確認
7. baseline の年齢・性別は抽出されているか確認
8. CONSORT flow diagramからのN数が extractedOutcomes に反映されているか
9. 時点違い・サブグループ違いが統合されていないか
10. 変化量（change from baseline）が術前・術後と別レコードになっているか

【出力】

// Gemini形式のスキーマ（OBJECT/STRINGを大文字に変換）
function toGeminiSchema(s){
  if(Array.isArray(s)) return s.map(toGeminiSchema);
  if(s && typeof s === 'object'){
    const r = {};
    for(const k in s){
      if(k === 'type') r[k] = String(s[k]).toUpperCase();
      else if(k === 'description') continue; // Gemini schemaでは description は OK だが簡略化
      else r[k] = toGeminiSchema(s[k]);
    }
    return r;
  }
  return s;
}

// Pick best provider for critic/verify based on priority
function pickBestProvider(providers, excludeProvider = null) {
  const candidates = [];
  Object.entries(providers).forEach(([name, cfg]) => {
    if (!cfg.enabled || !cfg.apiKey) return;
    if (name === excludeProvider) return;
    const modelInfo = PROVIDERS[name].models.find(m => m.id === cfg.model);
    candidates.push({ providerName: name, apiKey: cfg.apiKey, model: cfg.model, priority: modelInfo?.priority || 99 });
  });
  candidates.sort((a, b) => a.priority - b.priority);
  return candidates[0] || null;
}

// Exponential backoff retry
const fetchWithRetry = async (url, options, retries = 5) => {
  const delays = [1000, 2000, 4000, 8000, 16000];
  let lastErr;
  for (let i = 0; i < retries; i++) {
    try {
      const r = await fetch(url, options);
      if (!r.ok) {
        let d = {}; try { d = await r.json(); } catch (e) {}
        const msg = d.error?.message || d.error?.type || r.statusText;
        // 4xx clients errors (except 429) should not be retried
        if (r.status >= 400 && r.status < 500 && r.status !== 429) {
          throw new Error(`API Error ${r.status}: ${msg}`);
        }
        throw new Error(`API Error ${r.status}: ${msg}`);
      }
      return await r.json();
    } catch (e) {
      lastErr = e;
      if (i === retries - 1) throw e;
      // Don't retry auth errors
      if (/401|403|invalid.*key|unauthorized/i.test(e.message)) throw e;
      await new Promise(r => setTimeout(r, delays[i]));
    }
  }
  throw lastErr;
};

// Claude API call (Anthropic)
async function callClaude({ apiKey, model, systemPrompt, userText, pdfBase64, images, thinkingBudget = 16000, useTools = true }) {
  const content = [];
  if (pdfBase64) {
    content.push({
      type: "document",
      source: { type: "base64", media_type: "application/pdf", data: pdfBase64 },
      cache_control: { type: "ephemeral" }
    });
  }
  if (images && images.length) {
    images.forEach(img => content.push({
      type: "image",
      source: { type: "base64", media_type: "image/jpeg", data: img.inlineData.data }
    }));
  }
  content.push({ type: "text", text: userText });

  const body = {
    model: model,
    max_tokens: 16000,
    system: [{ type: "text", text: systemPrompt, cache_control: { type: "ephemeral" } }],
    messages: [{ role: "user", content: content }]
  };

  // Extended thinking
  if (thinkingBudget > 0) {
    body.thinking = { type: "enabled", budget_tokens: thinkingBudget };
    body.max_tokens = Math.max(body.max_tokens, thinkingBudget + 8000);
  }

  // Tool use for structured output
  if (useTools) {
    body.tools = [{
      name: "submit_extraction",
      description: "論文から抽出したメタ分析データを構造化して提出する",
      input_schema: EXTRACT_SCHEMA_JSON
    }];
    body.tool_choice = thinkingBudget > 0 ? { type: "any" } : { type: "tool", name: "submit_extraction" };
  }

  const resp = await fetchWithRetry("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "content-type": "application/json"
    },
    body: JSON.stringify(body)
  });

  // Parse response - find tool_use block or text block
  if (useTools) {
    const toolBlock = resp.content?.find(c => c.type === "tool_use");
    if (toolBlock?.input) return toolBlock.input;
  }
  const textBlock = resp.content?.find(c => c.type === "text");
  if (textBlock?.text) {
    try {
      // Strip markdown code fences if present
      const t = textBlock.text.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
      return JSON.parse(t);
    } catch (e) {
      throw new Error("Claude応答のJSONパース失敗: " + e.message);
    }
  }
  throw new Error("Claude応答に有効なコンテンツなし");
}

// Gemini API call (Google)
async function callGemini({ apiKey, model, systemPrompt, userText, pdfBase64, images, schema, thinkingBudget = 8000 }) {
  const parts = [{ text: userText }];
  if (pdfBase64) parts.push({ inlineData: { data: pdfBase64, mimeType: "application/pdf" } });
  if (images) images.forEach(img => parts.push(img));

  const genConfig = { temperature: 0.1 };
  if (schema) {
    genConfig.responseMimeType = "application/json";
    genConfig.responseSchema = schema;
  }
  if (thinkingBudget > 0) {
    genConfig.thinkingConfig = { thinkingBudget: thinkingBudget };
  }

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const body = {
    contents: [{ role: "user", parts: parts }],
    systemInstruction: { parts: [{ text: systemPrompt }] },
    generationConfig: genConfig
  };

  const resp = await fetchWithRetry(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const text = resp.candidates?.[0]?.content?.parts?.find(p => p.text)?.text;
  if (!text) throw new Error("Gemini応答なし");
  try {
    const cleaned = text.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
    return JSON.parse(cleaned);
  } catch (e) {
    throw new Error("Gemini応答のJSONパース失敗: " + e.message);
  }
}

// OpenAI API call
async function callOpenAI({ apiKey, model, systemPrompt, userText, images, schema }) {
  const userContent = [{ type: "text", text: userText }];
  if (images) {
    images.forEach(img => userContent.push({
      type: "image_url",
      image_url: { url: `data:image/jpeg;base64,${img.inlineData.data}`, detail: "high" }
    }));
  }

  const body = {
    model: model,
    messages: [
      { role: "system", content: systemPrompt },
      { role: "user", content: userContent }
    ],
    temperature: 0.1,
    max_tokens: 16000
  };
  if (schema) {
    body.response_format = {
      type: "json_schema",
      json_schema: { name: "extraction", schema: schema, strict: false }
    };
  } else {
    body.response_format = { type: "json_object" };
  }

  const resp = await fetchWithRetry("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify(body)
  });

  const text = resp.choices?.[0]?.message?.content;
  if (!text) throw new Error("OpenAI応答なし");
  try { return JSON.parse(text); }
  catch (e) { throw new Error("OpenAI応答のJSONパース失敗: " + e.message); }
}

// Unified AI caller
async function callAI(providerName, config, params) {
  const { apiKey, model } = config;
  if (providerName === "claude") {
    return await callClaude({ apiKey, model, ...params, useTools: params.useTools !== false });
  } else if (providerName === "gemini") {
    return await callGemini({ apiKey, model, schema: params.schema || EXTRACT_SCHEMA_GEMINI, ...params });
  } else if (providerName === "openai") {
    return await callOpenAI({ apiKey, model, schema: params.schema || EXTRACT_SCHEMA_JSON, ...params });
  }
  throw new Error(`未対応のプロバイダー: ${providerName}`);
}

function PdfPage({ pdf, pageNum, scale }) {
  const canvasRef = useRef(null); const textRef = useRef(null); const [w, setW] = useState('auto');
  useEffect(() => {
    let task;
    const render = async () => {
      try {
        const page = await pdf.getPage(pageNum);
        const vp = page.getViewport({ scale });
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d'); canvas.height = vp.height; canvas.width = vp.width; setW(`${vp.width}px`);
        task = page.render({ canvasContext: ctx, viewport: vp });
        await task.promise;
        const tc = await page.getTextContent();
        const tl = textRef.current; if (!tl) return;
        tl.innerHTML = ''; tl.style.width = `${vp.width}px`; tl.style.height = `${vp.height}px`; tl.style.setProperty('--scale-factor', scale);
        pdfjsLib.renderTextLayer({ textContentSource: tc, container: tl, viewport: vp, textDivs: [] });
      } catch (e) { if (e.name !== 'RenderingCancelledException') console.warn(e); }
    }; render(); return () => { if (task) try { task.cancel(); } catch (e) {} };
  }, [pdf, pageNum, scale]);
  return (<div id={`pdf-page-${pageNum}`} className="bg-white shadow-lg relative rounded overflow-hidden flex-shrink-0 mx-auto mb-4" style={{width:w}}><canvas ref={canvasRef} className="block"/><div ref={textRef} className="textLayer"/><div className="absolute top-1.5 left-1.5 bg-black/60 text-white text-[9px] font-mono px-1.5 py-0.5 rounded-full z-20">P.{pageNum}</div></div>);
}

function PdfViewer({ file, searchQuery, targetPage, onToast, scale }) {
  const [pdf, setPdf] = useState(null); const [numPages, setNumPages] = useState(0);
  useEffect(() => {
    if (!file) return; let d = false;
    file.arrayBuffer().then(buf => {
      if (d) return;
      pdfjsLib.getDocument({ data: buf }).promise.then(doc => {
        if (d) return; setPdf(doc); setNumPages(doc.numPages);
      }).catch(() => onToast("PDF読込失敗", "error"));
    });
    return () => { d = true; };
  }, [file]);
  useEffect(() => {
    if (!targetPage) return;
    const el = document.getElementById(`pdf-page-${targetPage}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, [targetPage]);
  useEffect(() => {
    if (!searchQuery) return;
    const timer = setTimeout(() => {
      document.querySelectorAll('.highlight-hook').forEach(el => el.classList.remove('highlight-hook'));
      const clean = searchQuery.replace(/[\n\r\t]/g, ' ').replace(/\s+/g, ' ').trim();
      if (!clean) return;
      const normQ = clean.toLowerCase().replace(/\s+/g, '');
      if (!normQ) return;
      let first = null; let matchCount = 0;
      document.querySelectorAll('.textLayer span').forEach(span => {
        const t = span.textContent; if (!t.trim()) return;
        const normS = t.toLowerCase().replace(/\s+/g, '');
        if (!normS) return;
        if (normS.includes(normQ) || (normS.length >= 3 && normQ.includes(normS))) {
          span.classList.add('highlight-hook'); matchCount++;
          if (!first) first = span;
        }
      });
      if (first) { first.scrollIntoView({ behavior: 'smooth', block: 'center' }); onToast(`該当箇所（${matchCount}部分）をハイライト`); }
      else onToast("テキスト未発見。別のキーワードをお試しください", "error");
    }, 700);
    return () => clearTimeout(timer);
  }, [searchQuery, scale]);

  if (!pdf) return <div className="flex h-full items-center justify-center text-slate-400"><span className="animate-spin h-5 w-5 border-2 border-slate-300 border-t-blue-500 rounded-full mr-2"/>PDF読込中...</div>;
  return (<div className="absolute top-0 left-0 min-w-full p-3 flex flex-col items-center pb-20">{Array.from({ length: numPages }, (_, i) => <PdfPage key={i+1} pdf={pdf} pageNum={i+1} scale={scale}/>)}</div>);
}

/* ============================================================
   SECTION 8: DATA PREPARATION
   ============================================================ */
async function extractPdfText(file) {
  const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  let t = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const p = await pdf.getPage(i);
    const c = await p.getTextContent();
    t += `\n--- Page ${i} ---\n` + c.items.map(x => x.str).join(' ');
  }
  return t;
}

async function extractPdfImages(file, onProgress, scale = 3.0) {
  const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  const parts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    if (onProgress) onProgress(`高解像度レンダリング (${i}/${pdf.numPages})`);
    const p = await pdf.getPage(i);
    const vp = p.getViewport({ scale });
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    c.height = vp.height; c.width = vp.width;
    await p.render({ canvasContext: ctx, viewport: vp }).promise;
    parts.push({ inlineData: { data: c.toDataURL('image/jpeg', 0.95).split(',')[1], mimeType: "image/jpeg" } });
    c.width = 0; c.height = 0;
  }
  return parts;
}

async function getPdfBase64(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = '';
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk) binary += String.fromCharCode.apply(null, bytes.slice(i, i + chunk));
  return btoa(binary);
}

// Merge two extraction results intelligently
function mergeResults(primary, secondary) {
  if (!secondary) return primary;
  if (!primary) return secondary;
  const result = JSON.parse(JSON.stringify(primary));

  // Merge outcomes
  if (secondary.extractedOutcomes) {
    if (!result.extractedOutcomes) result.extractedOutcomes = [];
    const pk = new Set(result.extractedOutcomes.map(o => `${o.actualOutcomeName}|${o.timePoint}|${o.variableType}|${o.populationType}|${o.sourceLocation}`));
    secondary.extractedOutcomes.forEach(o => {
      const key = `${o.actualOutcomeName}|${o.timePoint}|${o.variableType}|${o.populationType}|${o.sourceLocation}`;
      if (!pk.has(key)) {
        o.notes = (o.notes || '') + ' [補完抽出]';
        result.extractedOutcomes.push(o);
        pk.add(key);
      }
    });
  }

  // Merge baseline
  if (secondary.baselineCharacteristics) {
    if (!result.baselineCharacteristics) result.baselineCharacteristics = secondary.baselineCharacteristics;
    else {
      const bk = new Set(result.baselineCharacteristics.map(b => b.variable));
      secondary.baselineCharacteristics.forEach(b => {
        if (!bk.has(b.variable)) { result.baselineCharacteristics.push(b); bk.add(b.variable); }
      });
    }
  }

  // Merge arrays
  ['unclearItems', 'statisticalMethods'].forEach(k => {
    if (secondary[k]) {
      const s = new Set(result[k] || []);
      secondary[k].forEach(v => { if (!s.has(v)) (result[k] || (result[k] = [])).push(v); });
    }
  });

  // Prefer longer/more detailed commentary
  if (secondary.expertCommentary && (!result.expertCommentary || secondary.expertCommentary.length > result.expertCommentary.length * 1.5)) {
    result.expertCommentary = (result.expertCommentary ? result.expertCommentary + '\n\n【補足】\n' : '') + secondary.expertCommentary;
  }

  // CONSORT flow
  if (secondary.consortFlow && !result.consortFlow) result.consortFlow = secondary.consortFlow;

  // Paper quality
  if (secondary.paperQualityAssessment && !result.paperQualityAssessment) result.paperQualityAssessment = secondary.paperQualityAssessment;

  return result;
}

// Apply critic corrections to extracted data
function applyCorrections(extracted, criticReview) {
  if (!criticReview?.corrections) return extracted;
  const result = JSON.parse(JSON.stringify(extracted));

  criticReview.corrections.forEach(c => {
    const target = c.targetType === 'outcome' ? result.extractedOutcomes?.[c.targetIndex]
                 : c.targetType === 'baseline' ? result.baselineCharacteristics?.[c.targetIndex]
                 : null;
    if (!target) return;

    // Append critic note
    if (c.severity === 'critical' || c.severity === 'warning') {
      target.notes = (target.notes || '') + ` [Critic修正/${c.severity}: ${c.issue}]`;
      if (c.proposedFix && c.severity === 'critical') {
        // Try to apply proposed fix if clearly scoped
        const parts = c.field?.split('.');
        if (parts?.length === 2 && target[parts[0]] && typeof target[parts[0]] === 'object') {
          target[parts[0]][parts[1]] = c.proposedFix;
        } else if (c.field && target[c.field] !== undefined && typeof target[c.field] !== 'object') {
          target[c.field] = c.proposedFix;
        }
      }
    }
    target.confidence = target.confidence === 'high' ? 'medium' : target.confidence || 'medium';
  });

  if (criticReview.missingOutcomes?.length) {
    result.unclearItems = (result.unclearItems || []).concat(
      criticReview.missingOutcomes.map(m => `[Criticが欠落指摘] ${m}`)
    );
  }

  result._criticAssessment = criticReview.overallAssessment;
  result._criticConfidence = criticReview.confidenceScore;

  return result;
}

// Main extraction pipeline
async function runExtractionPipeline({ providers, accuracyMode, pdfFile, pico, outcomes, onProgress }) {
  const picoBlock = `【PICO設定】\nP: ${pico.p}\nI: ${pico.i}\nC: ${pico.c}\n\n【優先抽出アウトカム】\n${
    outcomes.filter(o => o.name.trim()).length
      ? outcomes.filter(o => o.name.trim()).map(o => `- ${o.name}${o.definition ? `: ${o.definition}` : ''}`).join('\n')
      : '全自動抽出モード（論文から全アウトカムを網羅）'
  }\n`;

  // Stage 1: Prepare PDF
  onProgress("stage1", "PDF準備中...", 5);
  const [pdfBase64, pdfText, pdfImages] = await Promise.all([
    getPdfBase64(pdfFile),
    extractPdfText(pdfFile),
    extractPdfImages(pdfFile, m => onProgress("stage1", m, 10), accuracyMode === 'ultra' ? 4.0 : 3.0)
  ]);
  onProgress("stage1", "PDF準備完了", 20);

  const userPrompt = `${picoBlock}
\n【タスク】
論文を徹底的に精読し、上記PICO/アウトカム設定に従ってメタ分析用データを抽出してください。
不明項目は「不明」とし、推測は厳禁です。全アウトカム（指定外含む）を網羅してください。
各項目に confidence (high/medium/low) を付与してください。
\n【参照テキスト（OCR済みPDF本文）】
${pdfText.substring(0, 40000)}`;

  // Stage 2: Run extractions in parallel based on providers
  const activeProviders = Object.entries(providers).filter(([_, cfg]) => cfg.enabled && cfg.apiKey);
  if (activeProviders.length === 0) throw new Error("有効なAIプロバイダーがありません。APIキーを設定してください。");

  onProgress("stage2", `並列抽出 (${activeProviders.length}モデル)...`, 25);

  const extractionPromises = [];
  const extractionLabels = [];

  activeProviders.forEach(([name, cfg], idx) => {
    extractionLabels.push(`${PROVIDERS[name].name} (${cfg.model})`);
    if (name === "claude") {
      // Claude gets both PDF native and text
      extractionPromises.push(
        callAI(name, cfg, {
          systemPrompt: SYSTEM_PROMPT_EXTRACT,
          userText: userPrompt,
          pdfBase64: pdfBase64,
          thinkingBudget: accuracyMode === 'ultra' ? 16000 : accuracyMode === 'high' ? 8000 : 2000
        }).catch(e => ({ _error: e.message, _provider: name }))
      );
    } else if (name === "gemini") {
      // Gemini gets text + images for best results
      extractionPromises.push(
        callAI(name, cfg, {
          systemPrompt: SYSTEM_PROMPT_EXTRACT,
          userText: userPrompt,
          images: pdfImages,
          thinkingBudget: accuracyMode === 'ultra' ? 12000 : accuracyMode === 'high' ? 6000 : 0
        }).catch(e => ({ _error: e.message, _provider: name }))
      );
    } else if (name === "openai") {
      // OpenAI with images
      extractionPromises.push(
        callAI(name, cfg, {
          systemPrompt: SYSTEM_PROMPT_EXTRACT,
          userText: userPrompt,
          images: pdfImages
        }).catch(e => ({ _error: e.message, _provider: name }))
      );
    }
  });

  const results = await Promise.all(extractionPromises);
  const validResults = results.filter(r => r && !r._error);
  const errors = results.filter(r => r?._error);

  if (validResults.length === 0) {
    throw new Error("すべての抽出が失敗しました:\n" + errors.map(e => `- ${e._provider}: ${e._error}`).join('\n'));
  }

  // Stage 3: Merge (if multiple)
  onProgress("stage3", "結果統合中...", 50);
  let merged = validResults[0];
  for (let i = 1; i < validResults.length; i++) {
    merged = mergeResults(merged, validResults[i]);
  }
  merged._sources = extractionLabels.slice(0, validResults.length);
  merged._errors = errors.map(e => `${e._provider}: ${e._error}`);

  // Stage 4: Critic review (uses best available provider)
  const criticProvider = pickBestProvider(providers);
  merged._criticProviderUsed = criticProvider ? `${PROVIDERS[criticProvider.providerName].name} (${criticProvider.model})` : null;
  if ((accuracyMode === 'high' || accuracyMode === 'ultra') && criticProvider) {
    const criticLabel = `${PROVIDERS[criticProvider.providerName].name} ${criticProvider.model}`;
    onProgress("stage4", `${criticLabel} Critic レビュー中...`, 65);
    try {
      const criticPrompt = `【抽出されたデータ】
${JSON.stringify(merged, null, 2).substring(0, 40000)}
\n【PICO設定】
${picoBlock}
\n【参照テキスト】
${pdfText.substring(0, 30000)}
\n【タスク】
上記抽出データに対して徹底的に監査を実施し、corrections / missingOutcomes / overallAssessment / confidenceScore を含むJSONを返してください。`;

      const criticReview = await callCriticAnyProvider(
        criticProvider,
        SYSTEM_PROMPT_CRITIC,
        criticPrompt,
        pdfBase64,
        pdfImages,
        accuracyMode === 'ultra' ? 16000 : 8000,
        CRITIC_SCHEMA
      );

      merged = applyCorrections(merged, criticReview);
      merged._criticReview = criticReview;
      onProgress("stage4", `Critic完了 (信頼度: ${criticReview.confidenceScore}/100)`, 80);
    } catch (e) {
      console.warn("Critic段階失敗:", e);
      merged._criticError = e.message;
    }
  }

  // Stage 5: Per-outcome verification (ultra mode, uses best provider)
  if (accuracyMode === 'ultra' && criticProvider && merged.extractedOutcomes?.length) {
    const toVerify = merged.extractedOutcomes.filter(o => o.confidence === 'low' || (!o.confidence && o.notes?.includes('Critic')));
    if (toVerify.length > 0 && toVerify.length <= 10) {
      onProgress("stage5", `個別検証 (${toVerify.length}項目)...`, 85);
      for (let i = 0; i < toVerify.length; i++) {
        const o = toVerify[i];
        try {
          const verifyPrompt = `【検証対象アウトカム】
${JSON.stringify(o, null, 2)}
\n【参照テキスト抜粋】
${pdfText.substring(0, 20000)}
\n検証してJSONで返してください。`;
          const verified = await callCriticAnyProvider(
            criticProvider,
            SYSTEM_PROMPT_VERIFY,
            verifyPrompt,
            null, null,
            4000,
            null
          );
          if (verified) {
            o._verified = verified.verified;
            o._verifyConfidence = verified.confidence;
            o._verifyIssues = verified.issues;
            if (verified.correctedValues) {
              Object.entries(verified.correctedValues).forEach(([k, v]) => {
                if (typeof v === 'object' && o[k]) Object.assign(o[k], v);
                else o[k] = v;
              });
            }
          }
          onProgress("stage5", `検証 ${i+1}/${toVerify.length}`, 85 + (i / toVerify.length) * 10);
        } catch (e) {
          console.warn(`検証失敗 (outcome ${i}):`, e);
        }
      }
    }
  }

  onProgress("complete", "完了", 100);
  return merged;
}

function renderBold(text) {
  if (!text) return null;
  const parts = String(text).split(/\*\*(.+?)\*\*/g);
  return parts.map((p, i) => i % 2 === 1 ? React.createElement('b', { key: i }, p) : p);
}

function SetupPage({ onComplete, initialConfig }) {
  const [providers, setProviders] = useState(() => ({
    claude: { enabled: true, apiKey: "", model: PROVIDERS.claude.defaultModel, ...initialConfig.claude },
    gemini: { enabled: false, apiKey: "", model: PROVIDERS.gemini.defaultModel, ...initialConfig.gemini },
    openai: { enabled: false, apiKey: "", model: PROVIDERS.openai.defaultModel, ...initialConfig.openai }
  }));
  const [accuracyMode, setAccuracyMode] = useState(initialConfig.accuracyMode || 'ultra');
  const [verifyStates, setVerifyStates] = useState({});
  const [saveKeys, setSaveKeys] = useState(initialConfig.saveKeys !== false);

  const updateProvider = (name, cfg) => setProviders(p => ({ ...p, [name]: cfg }));

  const verifyProvider = async (name) => {
    const cfg = providers[name];
    setVerifyStates(s => ({ ...s, [name]: { verifying: true } }));
    try {
      if (name === "claude") {
        const r = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "x-api-key": cfg.apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
            "content-type": "application/json"
          },
          body: JSON.stringify({
            model: cfg.model || PROVIDERS.claude.defaultModel,
            max_tokens: 10,
            messages: [{ role: "user", content: "hi" }]
          })
        });
        if (r.ok) setVerifyStates(s => ({ ...s, [name]: { result: 'ok', message: '接続成功' } }));
        else { const d = await r.json().catch(() => ({})); throw new Error(d.error?.message || `エラー ${r.status}`); }
      } else if (name === "gemini") {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${cfg.apiKey}`);
        if (r.ok) setVerifyStates(s => ({ ...s, [name]: { result: 'ok', message: '接続成功' } }));
        else { const d = await r.json().catch(() => ({})); throw new Error(d.error?.message || `エラー ${r.status}`); }
      } else if (name === "openai") {
        const r = await fetch("https://api.openai.com/v1/models", {
          headers: { "Authorization": `Bearer ${cfg.apiKey}` }
        });
        if (r.ok) setVerifyStates(s => ({ ...s, [name]: { result: 'ok', message: '接続成功' } }));
        else { const d = await r.json().catch(() => ({})); throw new Error(d.error?.message || `エラー ${r.status}`); }
      }
    } catch (e) {
      setVerifyStates(s => ({ ...s, [name]: { result: 'error', message: e.message } }));
    }
  };

  const anyEnabled = Object.values(providers).some(p => p.enabled && p.apiKey);
  const claudeEnabled = providers.claude.enabled && providers.claude.apiKey;

  const handleStart = () => {
    if (saveKeys) {
      saveConfig({ providers, accuracyMode, saveKeys });
    } else {
      saveConfig({ providers: { claude: { ...providers.claude, apiKey: "" }, gemini: { ...providers.gemini, apiKey: "" }, openai: { ...providers.openai, apiKey: "" } }, accuracyMode, saveKeys });
    }
    onComplete(providers, accuracyMode);
  };

  return (

function StageIndicator({ currentStage, progress, message }) {
  const stages = [
    { id: 'stage1', label: 'PDF準備', icon: FileText },
    { id: 'stage2', label: '並列AI抽出', icon: CpuIcon },
    { id: 'stage3', label: '結果統合', icon: LayersIcon },
    { id: 'stage4', label: 'Critic監査', icon: ShieldCheckIcon },
    { id: 'stage5', label: '個別検証', icon: BrainIcon }
  ];
  const currentIdx = stages.findIndex(s => s.id === currentStage);
  return (
    <div className="bg-white rounded-xl border border-purple-200 shadow-md p-4">
      <div className="mb-3 flex items-center justify-between">
        <h3 className="font-bold text-sm text-slate-800 flex items-center gap-1.5"><BrainIcon size={16} className="text-purple-600"/>多層抽出パイプライン実行中</h3>
        <span className="text-xs text-slate-500 font-mono">{progress}%</span>
      </div>
      <div className="w-full bg-slate-100 rounded-full h-2 mb-3 overflow-hidden">
        <div className="gradient-purple h-full transition-all duration-500" style={{width: `${progress}%`}}/>
      </div>
      <div className="grid grid-cols-5 gap-1">
        {stages.map((s, i) => {
          const Icon = s.icon;
          const active = i === currentIdx;
          const done = i < currentIdx || currentStage === 'complete';
          return (
            <div key={s.id} className={`text-center ${active ? 'stage-pulse' : ''}`}>
              <div className={`mx-auto w-8 h-8 rounded-full flex items-center justify-center mb-1 transition-all ${done ? 'bg-emerald-500 text-white' : active ? 'gradient-purple text-white' : 'bg-slate-100 text-slate-400'}`}>
                {done ? <CheckCircle2 size={16}/> : <Icon size={14}/>}
              </div>
              <div className={`text-[9px] font-medium ${active ? 'text-purple-700' : done ? 'text-emerald-700' : 'text-slate-400'}`}>{s.label}</div>
            </div>
          );
        })}
      </div>
      <div className="mt-2 text-[11px] text-slate-600 text-center animate-pulse">{message}</div>
    </div>
  );
}

function ExtractorPage({ providers, accuracyMode, onBack }) {
  const [pico, setPico] = useState({ p: "", i: "", c: "" });
  const [outcomes, setOutcomes] = useState([{ id: 1, name: "", definition: "" }]);
  const [pdfFile, setPdfFile] = useState(null);
  const [status, setStatus] = useState("idle");
  const [progress, setProgress] = useState(0);
  const [currentStage, setCurrentStage] = useState(null);
  const [statusMsg, setStatusMsg] = useState("");
  const [result, setResult] = useState(null);
  const [errMsg, setErrMsg] = useState("");
  const [toast, setToast] = useState(null);
  const [hlQuery, setHlQuery] = useState("");
  const [hlPage, setHlPage] = useState(null);
  const [pdfScale, setPdfScale] = useState(1.0);
  const [leftFontSize, setLeftFontSize] = useState(11);
  const [pdfSearchText, setPdfSearchText] = useState("");
  const fileRef = useRef(null);

  const showToast = (m, t = 'success') => { setToast({ message: m, type: t }); setTimeout(() => setToast(null), 3500); };
  const addOutcome = () => setOutcomes(p => [...p, { id: Date.now(), name: "", definition: "" }]);
  const removeOutcome = (id) => setOutcomes(p => p.length > 1 ? p.filter(o => o.id !== id) : p);
  const changeOutcome = (id, f, v) => setOutcomes(p => p.map(o => o.id === id ? { ...o, [f]: v } : o));
  const handleDrop = (e) => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f?.type === "application/pdf") setPdfFile(f); else showToast("PDFのみ対応", "error"); };
  const handleFileSelect = (e) => { const f = e.target.files[0]; if (f) setPdfFile(f); };

  const editOutcome = (idx, group, field, value) => {
    setResult(prev => {
      const nr = { ...prev };
      nr.extractedOutcomes = [...nr.extractedOutcomes];
      nr.extractedOutcomes[idx] = { ...nr.extractedOutcomes[idx] };
      nr.extractedOutcomes[idx][group] = { ...nr.extractedOutcomes[idx][group], [field]: value };
      return nr;
    });
  };

  const sendToSearch = (text, page) => {
    setPdfSearchText(text || "");
    if (page) setHlPage(page);
    setHlQuery(text || "");
    showToast("検索ボックスに送信");
  };
  const executePdfSearch = () => { if (!pdfSearchText.trim()) return; setHlQuery(pdfSearchText); };

  const startAnalysis = async () => {
    if (!pdfFile) { showToast("PDFをアップロードしてください", "error"); return; }
    if (!pico.p || !pico.i || !pico.c) { showToast("PICOを入力してください", "error"); return; }
    setErrMsg(""); setResult(null); setHlQuery(""); setHlPage(null); setPdfSearchText("");
    setStatus("running");

    try {
      const res = await runExtractionPipeline({
        providers, accuracyMode, pdfFile, pico, outcomes,
        onProgress: (stage, msg, pct) => {
          setCurrentStage(stage);
          setStatusMsg(msg);
          setProgress(pct);
        }
      });
      setResult(res);
      setStatus("complete");
      const sourceInfo = res._sources?.join(' + ') || '';
      showToast(`抽出完了 (${sourceInfo})`, 'success');
      if (res._criticConfidence) setTimeout(() => showToast(`Critic信頼度スコア: ${res._criticConfidence}/100`, 'info'), 1500);
    } catch (err) {
      console.error(err);
      setStatus("error");
      setErrMsg(err.message);
      showToast("エラーが発生しました", "error");
    }
  };

  const reVerifyOutcome = async (idx) => {
    const verifier = pickBestProvider(providers);
    if (!verifier) { showToast("再検証には有効なAPIキーが必要", "error"); return; }
    const oc = result.extractedOutcomes[idx];
    showToast(`${PROVIDERS[verifier.providerName].name.split(' ')[0]} で再検証中...`, "info");
    try {
      const pdfText = await extractPdfText(pdfFile);
      const prompt = `【検証対象】\n${JSON.stringify(oc, null, 2)}\n\n【参照テキスト】\n${pdfText.substring(0, 20000)}\n\n検証してJSON返答。`;
      const v = await callCriticAnyProvider(
        verifier,
        SYSTEM_PROMPT_VERIFY,
        prompt,
        null, null,
        6000,
        null
      );
      setResult(prev => {
        const nr = { ...prev };
        nr.extractedOutcomes = [...nr.extractedOutcomes];
        nr.extractedOutcomes[idx] = {
          ...nr.extractedOutcomes[idx],
          _verified: v.verified,
          _verifyConfidence: v.confidence,
          _verifyIssues: v.issues,
          ...(v.correctedValues || {})
        };
        return nr;
      });
      showToast(`検証完了 (${v.verified ? '確認OK' : '要確認'} / 信頼度${v.confidence})`);
    } catch (e) {
      showToast("検証失敗: " + e.message, "error");
    }
  };

  const copyOneTSV = (o) => { clipCopy(toDelimited(OC_HDRS, [outcomeRow(o)], "\t")) && showToast("TSVコピー完了"); };
  const copyOneCSV = (o) => { clipCopy(toDelimited(OC_HDRS, [outcomeRow(o)], ",")) && showToast("CSVコピー完了"); };
  const copyAllTSV = () => {
    if (!result) return;
    let t = "";
    if (result.baselineCharacteristics?.length) t += "[患者背景]\n" + toDelimited(BL_HDRS, result.baselineCharacteristics.map(baselineRow), "\t") + "\n\n";
    if (result.extractedOutcomes?.length) t += "[アウトカム]\n" + toDelimited(OC_HDRS, result.extractedOutcomes.map(outcomeRow), "\t");
    clipCopy(t) && showToast("全TSVコピー完了");
  };
  const copyAllCSV = () => {
    if (!result) return;
    let t = "";
    if (result.baselineCharacteristics?.length) t += toDelimited(BL_HDRS, result.baselineCharacteristics.map(baselineRow), ",") + "\n\n";
    if (result.extractedOutcomes?.length) t += toDelimited(OC_HDRS, result.extractedOutcomes.map(outcomeRow), ",");
    clipCopy(t) && showToast("全CSVコピー完了");

  const copyBaselineTSV = () => { result?.baselineCharacteristics && clipCopy(toDelimited(BL_HDRS, result.baselineCharacteristics.map(baselineRow), "\t")) && showToast("患者背景TSVコピー完了"); };
  const saveSession = () => {
    const s = { pico, outcomes, result, providers: Object.fromEntries(Object.entries(providers).map(([k, v]) => [k, { ...v, apiKey: "***REDACTED***" }])), accuracyMode, timestamp: new Date().toISOString() };
    const b = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `meta-extract-v3-${Date.now()}.json`;
    a.click();
    showToast("保存完了");
  };

  const activeProviderInfo = Object.entries(providers).filter(([_, c]) => c.enabled && c.apiKey).map(([n, c]) => `${PROVIDERS[n].name.split(' ')[0]}`).join('+');

  return (
    <div className="flex flex-col h-full bg-slate-50 text-slate-800">
      <Toast toast={toast}/>
      <header className="bg-white/90 backdrop-blur-sm border-b border-slate-200 py-2 px-3 z-20 flex-shrink-0">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <button onClick={onBack} className="text-slate-400 hover:text-purple-600 p-0.5 transition-colors"><ChevronLeft size={20}/></button>
            <BrainIcon size={20} className="text-purple-700"/>
            <h1 className="text-sm sm:text-base font-bold text-slate-800">Meta-Analysis Data Extractor <span className="text-[10px] gradient-text font-mono font-bold">v3 Opus 4.7</span></h1>
          </div>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-slate-500 bg-slate-100 border border-slate-200 px-2 py-1 rounded font-mono hidden sm:flex items-center gap-1">
              <LayersIcon size={10}/> {accuracyMode.toUpperCase()} | {activeProviderInfo}
            </span>
            {result && <button onClick={saveSession} className="text-[10px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-medium text-slate-600 transition-colors"><SaveIcon size={12}/>保存</button>}
          </div>
        </div>
      </header>

      <main className={`flex-1 flex flex-col min-h-0 w-full overflow-hidden ${status==='complete'?'p-1.5 sm:p-3':''}`}>
        {status !== 'complete' && (
          <div className="flex-1 overflow-y-auto p-3 sm:p-5 max-w-4xl mx-auto w-full space-y-4 pb-10">
            <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in-up">
              <div className="bg-slate-100 px-4 py-2 border-b border-slate-200 flex items-center gap-2"><SettingsIcon size={15} className="text-slate-500"/><h2 className="font-semibold text-slate-700 text-xs">PICO設定</h2></div>
              <div className="p-3 space-y-2">
                {[["P (患者)", "p", "例: 心不全患者"], ["I (介入)", "i", "例: SGLT2阻害薬"], ["C (比較)", "c", "例: プラセボ"]].map(([l, k, ph]) => (
                  <div key={k}>

                    <input type="text" value={pico[k]} onChange={e => setPico({ ...pico, [k]: e.target.value })} className="w-full text-xs p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder={ph}/>

              </div>
            )}
            {status === 'idle' && !result && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center p-8 text-slate-400 fade-in-up fade-d3">
                <BrainIcon size={40} className="mb-3 opacity-20"/>
                <p className="text-sm font-medium text-slate-500">結果はここに表示されます</p>
              </div>
            )}
            {status === 'error' && errMsg && (
              <div className="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-xs whitespace-pre-wrap">
                <AlertCircle size={16} className="inline mr-1"/>{errMsg}
              </div>
            )}
          </div>
        )}

        {status === 'complete' && result && (
          <div className="flex flex-1 min-h-0 gap-2 split-h">
            <div className="w-full xl:w-[55%] h-full flex flex-col bg-white rounded-lg shadow border border-slate-200 overflow-hidden split-pane">
              <div className="flex items-center justify-between bg-slate-50 px-3 py-1.5 border-b border-slate-200 flex-shrink-0">
                <h2 className="font-bold text-xs text-slate-800 flex items-center gap-1.5"><Database size={14} className="text-purple-600"/>抽出データ
                  {result._criticConfidence && <span className="ml-1 bg-purple-100 text-purple-700 text-[9px] font-bold px-1.5 py-0.5 rounded">Critic信頼度 {result._criticConfidence}/100</span>}
                </h2>
                <div className="flex items-center gap-2">
                  <div className="flex items-center gap-1 bg-white border border-slate-200 rounded px-1.5 py-0.5">
                    <TypeIcon size={11} className="text-slate-400"/>
                    <button onClick={() => setLeftFontSize(s => Math.max(7, s-1))} className="text-slate-500 hover:text-purple-600 px-0.5 font-bold text-[10px]">−</button>
                    <span className="text-[9px] font-mono w-5 text-center text-slate-600">{leftFontSize}</span>
                    <button onClick={() => setLeftFontSize(s => Math.min(16, s+1))} className="text-slate-500 hover:text-purple-600 px-0.5 font-bold text-[10px]">+</button>
                  </div>
                  <button onClick={copyAllTSV} className="text-[9px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-bold"><CopyIcon size={10}/>TSV</button>
                  <button onClick={copyAllCSV} className="text-[9px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-bold"><CopyIcon size={10}/>CSV</button>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-2 sm:p-3 space-y-4" style={{fontSize:`${leftFontSize}px`}}>
                {/* Source info banner */}
                {result._sources && (
                  <div className="bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-lg px-3 py-2 flex items-start gap-2" style={{fontSize:`${Math.max(9,leftFontSize*0.85)}px`}}>
                    <BrainIcon size={14} className="text-purple-600 flex-shrink-0 mt-0.5"/>
                    <div className="flex-1">
                      <div className="font-semibold text-purple-900">抽出ソース:</div>
                      <div className="text-purple-700">{result._sources.join(' + ')}</div>
                      {result._criticProviderUsed && <div className="mt-1 text-purple-700 text-[10px]"><ShieldCheckIcon size={10} className="inline mr-0.5"/><b>Critic担当:</b> {result._criticProviderUsed}</div>}
                      {result._criticAssessment && <div className="mt-1 text-slate-700"><b>Critic評価:</b> {result._criticAssessment}</div>}
                      {result._errors?.length > 0 && <div className="mt-1 text-amber-700 text-[10px]">部分エラー: {result._errors.join(' / ')}</div>}
                    </div>
                  </div>
                )}

                <section className="border border-slate-200 rounded-lg overflow-hidden">
                  <div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700" style={{fontSize:`${leftFontSize}px`}}>PICO比較</h3></div>
                  <table className="w-full">
                    <thead className="bg-slate-50 text-slate-500 border-b">
                      <tr>
                        <th className="px-2 py-1 text-left w-10">要素</th>
                        <th className="px-2 py-1 text-left border-l border-slate-200">設定</th>
                        <th className="px-2 py-1 text-left border-l border-slate-200 bg-blue-50/50">論文</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {[["P", "p", "P"], ["I", "i", "I"], ["C", "c", "C"]].map(([l, k, pk]) => (
                        <tr key={k}>
                          <td className="px-2 py-1 font-medium">{l}</td>
                          <td className="px-2 py-1 border-l border-slate-200">{pico[k] || "-"}</td>
                          <td className="px-2 py-1 border-l border-slate-200 bg-blue-50/20">{result.paperPICO?.[pk] || "不明"}</td>
                        </tr>
                      ))}
                      {result.paperPICO?.thirdGroup && <tr><td className="px-2 py-1 font-medium text-purple-700">3群</td><td className="px-2 py-1 border-l border-slate-200">-</td><td className="px-2 py-1 border-l border-slate-200 bg-purple-50/30 font-medium text-purple-800">{result.paperPICO.thirdGroup}</td></tr>}
                      {result.paperPICO?.followUpDuration && <tr><td className="px-2 py-1 font-medium text-slate-500">追跡</td><td className="px-2 py-1 border-l border-slate-200">-</td><td className="px-2 py-1 border-l border-slate-200">{result.paperPICO.followUpDuration}</td></tr>}
                    </tbody>
                  </table>
                </section>

                {result.consortFlow && (
                  <section className="border border-indigo-200 rounded-lg overflow-hidden">
                    <div className="bg-indigo-50 px-2 py-1 border-b border-indigo-200"><h3 className="font-semibold text-indigo-800">🌀 CONSORT Flow</h3></div>
                    <table className="w-full" style={{fontSize:`${Math.max(9,leftFontSize*0.9)}px`}}>
                      <tbody className="divide-y divide-slate-100">
                        <tr><td className="px-2 py-0.5 text-slate-600">無作為化 N</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.randomized || "-"}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">割付 (介入/対照/3群)</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.allocatedIntervention || "-"} / {result.consortFlow.allocatedComparison || "-"}{result.consortFlow.allocatedThird ? ` / ${result.consortFlow.allocatedThird}` : ""}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">ITT解析 N</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.analyzedITT_intervention || "-"} / {result.consortFlow.analyzedITT_comparison || "-"}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">PP解析 N</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.analyzedPP_intervention || "-"} / {result.consortFlow.analyzedPP_comparison || "-"}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">脱落 (介入/対照)</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.lostToFollowUp_intervention || "-"} / {result.consortFlow.lostToFollowUp_comparison || "-"}</td></tr>
                      </tbody>
                    </table>
                  </section>
                )}

                {result.baselineCharacteristics?.length > 0 && (
                  <section className="border border-emerald-200 rounded-lg overflow-hidden">
                    <div className="bg-emerald-50 px-2 py-1 border-b border-emerald-200 flex items-center justify-between">
                      <h3 className="font-semibold text-emerald-800">👥 患者背景</h3>
                      <button onClick={copyBaselineTSV} className="bg-white border border-emerald-300 px-1.5 py-0.5 rounded font-medium text-emerald-700 hover:bg-emerald-100" style={{fontSize:`${Math.max(8,leftFontSize*0.8)}px`}}><CopyIcon size={9} className="inline mr-0.5"/>TSV</button>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full whitespace-nowrap">
                        <thead className="bg-slate-50 text-slate-500 border-b">
                          <tr>
                            <th className="px-1.5 py-1 text-left border-r sticky left-0 bg-slate-50 z-10 min-w-[80px]">変数</th>
                            <th className="px-1 py-1 text-center border-r" colSpan="3">介入群</th>
                            <th className="px-1 py-1 text-center border-r" colSpan="3">対照群</th>
                            <th className="px-1 py-1 text-center">P値</th>
                          </tr>
                          <tr className="bg-slate-100 border-b" style={{fontSize:`${Math.max(7,leftFontSize*0.75)}px`}}>
                            <th className="px-1.5 py-0.5 border-r sticky left-0 bg-slate-100 z-10"/>
                            {["N","値","SD/%","N","値","SD/%"].map((h,i)=><th key={i} className="px-1 py-0.5 text-center border-r font-medium">{h}</th>)}
                            <th className="px-1 py-0.5 text-center"/>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {result.baselineCharacteristics.map((b, idx) => (
                            <tr key={idx} className="hover:bg-blue-50/30">
                              <td className="px-1.5 py-1 border-r font-medium text-slate-800 sticky left-0 bg-white z-10">
                                {b.variable}
                                {b.unit && <span className="text-slate-400 ml-0.5">({b.unit})</span>}
                                {b.pageNumber && <span className="text-slate-400 ml-0.5 font-mono" style={{fontSize:`${Math.max(6,leftFontSize*0.65)}px`}}>P{b.pageNumber}</span>}
                              </td>
                              <td className="px-1 py-1 border-r text-center">{b.interventionGroup?.n || "-"}</td>
                              <td className="px-1 py-1 border-r text-center font-medium text-blue-700">{b.interventionGroup?.value || "-"}</td>
                              <td className="px-1 py-1 border-r text-center text-slate-500">{b.interventionGroup?.sd || b.interventionGroup?.percent || b.interventionGroup?.iqr || "-"}</td>
                              <td className="px-1 py-1 border-r text-center">{b.comparisonGroup?.n || "-"}</td>
                              <td className="px-1 py-1 border-r text-center font-medium text-blue-700">{b.comparisonGroup?.value || "-"}</td>
                              <td className="px-1 py-1 border-r text-center text-slate-500">{b.comparisonGroup?.sd || b.comparisonGroup?.percent || b.comparisonGroup?.iqr || "-"}</td>
                              <td className="px-1 py-1 text-center">{b.pValue && b.pValue !== "-" ? <span className={`font-mono ${parseFloat(b.pValue)<0.05?'text-red-600 font-bold':'text-slate-600'}`}>{b.pValue}</span> : "-"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="px-2 py-1 bg-slate-50 border-t border-slate-200 text-slate-500 flex justify-between" style={{fontSize:`${Math.max(8,leftFontSize*0.8)}px`}}>
                      <span>{result.baselineCharacteristics.length}項目</span>
                      <span>出処: {result.baselineCharacteristics[0]?.sourceLocation || "Table 1等"}</span>
                    </div>
                  </section>
                )}

                <div className="space-y-3">
                  {result.extractedOutcomes?.map((oc, idx) => (
                    <OutcomeCard key={idx} oc={oc} idx={idx} pico={pico} onEdit={editOutcome}
                      onCopyTSV={copyOneTSV} onCopyCSV={copyOneCSV} fontSize={leftFontSize}
                      onHighlight={(o) => { setHlQuery(o.evidenceText); setHlPage(o.pageNumber); setPdfSearchText(o.evidenceText || ""); }}
                      onSendToSearch={sendToSearch}
                      onReVerify={pickBestProvider(providers) ? reVerifyOutcome : null}/>
                  ))}
                  {(!result.extractedOutcomes?.length) && <div className="text-center py-6 text-slate-500">データなし</div>}
                </div>

                {result.expertCommentary && (
                  <section className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-lg border border-indigo-100 overflow-hidden">
                    <div className="px-2 py-1.5 border-b border-indigo-100 flex items-center gap-1"><Sparkles size={12} className="text-indigo-600"/><h3 className="font-bold text-indigo-800">AI考察</h3></div>
                    <div className="p-2 text-indigo-900 leading-relaxed whitespace-pre-wrap">{result.expertCommentary}</div>
                  </section>
                )}

                {result.paperQualityAssessment && (
                  <section className="bg-gradient-to-br from-amber-50 to-orange-50 rounded-lg border border-amber-200 overflow-hidden">
                    <div className="px-2 py-1.5 border-b border-amber-200 flex items-center gap-1"><ShieldIcon size={12} className="text-amber-600"/><h3 className="font-bold text-amber-800">論文品質評価</h3></div>
                    <div className="p-2 text-amber-900 leading-relaxed whitespace-pre-wrap">{result.paperQualityAssessment}</div>
                  </section>
                )}

                <div className="grid grid-cols-2 gap-2">
                  <section className="bg-white rounded-lg border border-slate-200 overflow-hidden">
                    <div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700">統計手法</h3></div>
                    <ul className="p-2 list-disc pl-4 text-slate-600 space-y-0.5">
                      {result.statisticalMethods?.length ? result.statisticalMethods.map((m, i) => <li key={i}>{m}</li>) : <li className="text-slate-400 list-none">不明</li>}
                    </ul>
                  </section>
                  <section className="bg-white rounded-lg border border-slate-200 overflow-hidden">
                    <div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700 flex items-center gap-1"><AlertCircle size={10} className="text-amber-500"/>不明点・要確認</h3></div>
                    <ul className="p-2 list-disc pl-4 text-slate-600 space-y-0.5">
                      {result.unclearItems?.length ? result.unclearItems.map((x, i) => <li key={i}>{x}</li>) : <li className="text-slate-400 list-none">なし</li>}
                    </ul>
                  </section>
                </div>
              </div>
            </div>

            <div className="w-full xl:w-[45%] h-full flex flex-col bg-slate-200 rounded-lg border border-slate-300 shadow-inner overflow-hidden relative split-pane">
              <div className="bg-slate-800 text-slate-200 text-[9px] px-2 py-1.5 flex items-center justify-between z-10 flex-shrink-0">
                <span className="flex items-center gap-1 font-mono truncate max-w-[35%]"><FileText size={11}/>{pdfFile?.name}</span>
                <div className="flex items-center gap-1.5">
                  {hlQuery ? <span className="bg-yellow-400 text-yellow-900 px-1 py-0.5 rounded font-bold text-[8px] animate-pulse">HL</span> : null}
                  <div className="flex items-center gap-0.5 bg-slate-700 p-0.5 rounded">
                    <button onClick={() => setPdfScale(s => Math.max(0.4, s-0.2))} className="p-0.5 hover:bg-slate-500 rounded text-slate-300"><ZoomOutIcon size={11}/></button>
                    <span className="font-mono w-7 text-center text-[9px]">{Math.round(pdfScale*100)}%</span>
                    <button onClick={() => setPdfScale(s => Math.min(3, s+0.2))} className="p-0.5 hover:bg-slate-500 rounded text-slate-300"><ZoomInIcon size={11}/></button>
                  </div>
                </div>
              </div>

              <div className="bg-slate-700 px-2 py-1.5 flex items-center gap-1.5 z-10 flex-shrink-0 border-b border-slate-600">
                <SearchIcon size={13} className="text-slate-400 flex-shrink-0"/>
                <input type="text" value={pdfSearchText} onChange={e => setPdfSearchText(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') executePdfSearch(); }}
                  placeholder="テキストを貼り付けてEnterまたは検索..."
                  className="flex-1 bg-slate-600 text-white text-[10px] px-2 py-1 rounded border border-slate-500 focus:outline-none focus:border-purple-400 placeholder-slate-400 font-mono"/>
                <button onClick={executePdfSearch} className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-[9px] font-bold px-2 py-1 rounded flex items-center gap-0.5 flex-shrink-0"><TargetIcon size={10}/>検索</button>
                <button onClick={() => { document.querySelectorAll('.highlight-hook').forEach(el => el.classList.remove('highlight-hook')); setPdfSearchText(""); setHlQuery(""); showToast("ハイライト解除"); }} className="text-slate-400 hover:text-white text-[9px] px-1 py-1 rounded flex-shrink-0" title="クリア"><XCircle size={12}/></button>
              </div>

              <div className="flex-1 overflow-auto relative bg-slate-300">
                <PdfViewer file={pdfFile} searchQuery={hlQuery} targetPage={hlPage} onToast={showToast} scale={pdfScale}/>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

/* ============================================================
   SECTION 14: ROOT
   ============================================================ */
function App() {
  const [page, setPage] = useState("setup");
  const [providers, setProviders] = useState(null);
  const [accuracyMode, setAccuracyMode] = useState('ultra');
  const [initialConfig] = useState(() => loadConfig());

  const handleSetupComplete = (providers, mode) => {
    setProviders(providers);
    setAccuracyMode(mode);
    setPage("main");
  };

  if (page === "setup") return <SetupPage onComplete={handleSetupComplete} initialConfig={initialConfig}/>;
  return <ExtractorPage providers={providers} accuracyMode={accuracyMode} onBack={() => setPage("setup")}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
