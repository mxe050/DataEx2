  );
}

function ExtractorPage({ apiKeys, model: initialModel, onBack }) {
  // ローカルでモデル状態を持つ → 結果画面からでも変更可能
  const [model, setModel] = useState(initialModel);
  // 抽出中のモデル変更を次のステージから即反映するためのref
  const modelRef = useRef(initialModel);
  // API診断パネルの開閉
  const [showDiag, setShowDiag] = useState(false);
  // メタ分析プレビュー: null か { kind: 'binary'|'continuous', studyId, headers, rows }
  const [metaPreview, setMetaPreview] = useState(null);
  useEffect(() => { modelRef.current = model; }, [model]);
  const handleModelChange = (newModel) => {
    if (!GEMINI_MODELS.find(m => m.id === newModel)) return;
    setModel(newModel);
    modelRef.current = newModel;
    // localStorage にも反映（次回起動でも保持）
    try {
      const cfg = loadConfig();
      saveConfig({ ...cfg, model: newModel });
    } catch (e) { console.warn('config save failed', e); }
    const info = GEMINI_MODELS.find(m => m.id === newModel);
    const isExtracting = status === 'running';
    setTimeout(() => setToast({
      message: isExtracting
        ? `🔄 モデル変更: ${info.name.replace(/\s*\(.+/, '')}（次のステージから適用）`
        : `モデル変更: ${info.name.replace(/\s*\(.+/, '')}`,
      type: 'info'
    }), 50);
    setTimeout(() => setToast(null), 3500);
  };
  const [pico, setPico] = useState({ p: "", i: "", c: "" });
  const [outcomes, setOutcomes] = useState([{ id: 1, name: "", definition: "" }]);
  const [pdfFile, setPdfFile] = useState(null);
  const [status, setStatus] = useState("idle");
  const [progress, setProgress] = useState(0);
  const [currentStage, setCurrentStage] = useState(null);
  const [statusMsg, setStatusMsg] = useState("");
  const [result, setResult] = useState(null);
  const [errMsg, setErrMsg] = useState("");
  const [toast, setToast] = useState(null);
  const [hlQuery, setHlQuery] = useState("");
  const [hlPage, setHlPage] = useState(null);
  const [pdfScale, setPdfScale] = useState(1.0);
  const [leftFontSize, setLeftFontSize] = useState(13);
  const [pdfSearchText, setPdfSearchText] = useState("");
  const fileRef = useRef(null);

  const showToast = (m, t = 'success') => { setToast({ message: m, type: t }); setTimeout(() => setToast(null), 3500); };
  const addOutcome = () => setOutcomes(p => [...p, { id: Date.now(), name: "", definition: "" }]);
  const removeOutcome = (id) => setOutcomes(p => p.length > 1 ? p.filter(o => o.id !== id) : p);
  const changeOutcome = (id, f, v) => setOutcomes(p => p.map(o => o.id === id ? { ...o, [f]: v } : o));
  const handleDrop = (e) => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f?.type === "application/pdf") setPdfFile(f); else showToast("PDFのみ対応", "error"); };
  const handleFileSelect = (e) => { const f = e.target.files[0]; if (f) setPdfFile(f); };

  const editOutcome = (idx, group, field, value) => {
    setResult(prev => {
      const nr = { ...prev };
      nr.extractedOutcomes = [...nr.extractedOutcomes];
      nr.extractedOutcomes[idx] = { ...nr.extractedOutcomes[idx] };
      nr.extractedOutcomes[idx][group] = { ...nr.extractedOutcomes[idx][group], [field]: value };
      return nr;
    });
  };

  const sendToSearch = (text, page) => {
    setPdfSearchText(text || "");
    if (page) setHlPage(page);
    setHlQuery(text || "");
    showToast("検索ボックスに送信");
  };
  const executePdfSearch = () => { if (!pdfSearchText.trim()) return; setHlQuery(pdfSearchText); };

  const startAnalysis = async () => {
    if (!pdfFile) { showToast("PDFをアップロードしてください", "error"); return; }
    if (!pico.p || !pico.i || !pico.c) { showToast("PICOを入力してください", "error"); return; }
    if (!apiKeys?.length) { showToast("APIキーが設定されていません", "error"); return; }
    setErrMsg(""); setResult(null); setHlQuery(""); setHlPage(null); setPdfSearchText("");
    setStatus("running");

    try {
      const res = await runExtractionPipeline({
        apiKeys, model,
        getModel: () => modelRef.current,  // 抽出中の手動切替に追従するための ref-based getter
        pdfFile, pico, outcomes,
        onProgress: (stage, msg, pct) => {
          setCurrentStage(stage);
          setStatusMsg(msg);
          setProgress(pct);
        },
        onNotice: (msg) => showToast(msg, 'info')
      });
      setResult(res);
      setStatus("complete");
      const sourceInfo = res._sources?.join(' + ') || '';
      showToast(`抽出完了 (${sourceInfo})`, 'success');
      if (res._criticConfidence) setTimeout(() => showToast(`Critic信頼度スコア: ${res._criticConfidence}/100`, 'info'), 1500);
    } catch (err) {
      console.error(err);
      setStatus("error");
      setErrMsg(err.message);
      showToast("エラーが発生しました", "error");
    }
  };

  // PDF の選択範囲（文字 or 画像）から1アウトカムを抽出して既存リストに追加
  const [pdfSelectionMode, setPdfSelectionMode] = useState('text'); // 'text' or 'area'
  const [extractingFromSelection, setExtractingFromSelection] = useState(false);
  const [highlightNewIdx, setHighlightNewIdx] = useState(null);

  const extractFromSelection = async ({ type, text, image, pageNum }) => {
    if (!apiKeys?.length) { showToast("APIキーが必要", "error"); return; }
    if (extractingFromSelection) { showToast("抽出中です。完了をお待ちください", "info"); return; }
    if (type === 'text' && (!text || text.trim().length < 10)) { showToast("選択テキストが短すぎます（10文字以上）", "error"); return; }
    if (type === 'image' && !image) { showToast("画像が取得できませんでした", "error"); return; }

    setExtractingFromSelection(true);
    const modelInfo = GEMINI_MODELS.find(m => m.id === model) || GEMINI_MODELS[0];
    // 画像抽出時、選択モデルがテキスト専用なら自動で Flash Lite に切替
    const targetModel = (type === 'image' && modelInfo.textOnly) ? 'gemini-2.5-flash-lite' : model;
    if (targetModel !== model) showToast(`📷 画像抽出のため ${targetModel} に切替`, 'info');

    showToast(`🔍 選択範囲から抽出中...`, 'info');
    try {
      const rotator = makeKeyRotator(apiKeys);
      // 選択範囲（テキスト/画像）抽出のプロンプトは extraction-algorithm.js に集約
      const sysPrompt = window.ExtractionAlgorithm.buildSelectionSystemPrompt({ type });
      const userPrompt = window.ExtractionAlgorithm.buildSelectionUserPrompt({ type, text, pageNum });


      let actualModelUsed = targetModel;
      const newOutcome = await callGemini({
        rotator,
        model: targetModel,
        systemPrompt: sysPrompt,
        userText: userPrompt,
        images: type === 'image' ? [{ inlineData: { data: image, mimeType: "image/jpeg" } }] : null,
        pdfBase64: null,
        schema: SINGLE_OUTCOME_SCHEMA_GEMINI,
        thinkingBudget: 0,
        onNotice: (m) => showToast(m, 'info'),
        onModelUsed: (m) => { actualModelUsed = m; }
      });

      if (!newOutcome || !newOutcome.actualOutcomeName) { throw new Error("有効なアウトカムが返されませんでした"); }

      // 既存結果に追加（実際に使われたモデルを記録 — フォールバック発生時の表示精度のため）
      const modelLabel = actualModelUsed !== targetModel ? `${actualModelUsed}(${targetModel}からフォールバック)` : actualModelUsed;
      newOutcome.notes = (newOutcome.notes || '') + ` [${type === 'text' ? '📝選択テキスト' : '🔲選択範囲画像'}から追加抽出 P.${pageNum||'?'} / ${modelLabel}]`;
      newOutcome._addedFromSelection = true;
      newOutcome._actualModel = actualModelUsed;
      if (!newOutcome.pageNumber && pageNum) newOutcome.pageNumber = pageNum;
      if (actualModelUsed !== targetModel) {
        showToast(`📌 ${targetModel} → ${actualModelUsed} に自動切替して成功`, 'info');
      }

      // === 2群抽出の安全ネット ===
      // 条件: evidenceText に「n=X」が 2 個以上ある + 介入群は埋まっている + 対照群が空
      // → 再抽出と同じ補完プロンプトを 1 回だけ呼んで対照群を埋める
      try {
        const evidence = newOutcome.evidenceText || '';
        const nMatchCount = (evidence.match(/n\s*=\s*\d+/gi) || []).length;
        const blank = (v) => !v || ['', '不明', '未抽出', '-'].includes(String(v).trim());
        const interventionFilled = !blank(newOutcome.interventionGroup?.n_total);
        const comparisonEmpty = blank(newOutcome.comparisonGroup?.n_total);
        if (nMatchCount >= 2 && interventionFilled && comparisonEmpty) {
          showToast('🔄 対照群が未抽出のため自動補完を試行中...', 'info');
          // 対照群自動補完プロンプトは extraction-algorithm.js に集約
          const completionPrompt = window.ExtractionAlgorithm.buildCompletionPrompt({
            intervention: newOutcome.interventionGroup,
            evidence,
          });
          try {
            const completion = await callGemini({
              rotator,
              model: targetModel,
              systemPrompt: window.ExtractionAlgorithm.NUMERIC_FOCUSED_SYSTEM_PROMPT,
              userText: completionPrompt,
              thinkingBudget: 0,
              onNotice: () => {},
            });
            if (completion?.comparisonGroup && !blank(completion.comparisonGroup.n_total)) {
              newOutcome.comparisonGroup = { ...(newOutcome.comparisonGroup || {}), ...completion.comparisonGroup };
              if (completion.effectEstimate && blank(newOutcome.effectEstimate?.value)) {
                newOutcome.effectEstimate = { ...(newOutcome.effectEstimate || {}), ...completion.effectEstimate };
              }
              newOutcome.notes = (newOutcome.notes || '') + ' [対照群を自動補完済み]';
              showToast('✅ 対照群を自動補完しました', 'success');
            }
          } catch (compErr) {
            console.warn('対照群自動補完失敗:', compErr);
          }
        }
      } catch (autoErr) {
        console.warn('自動補完判定エラー:', autoErr);
      }

      setResult(prev => {
        const base = prev || { extractedOutcomes: [], paperPICO: {}, statisticalMethods: [], unclearItems: [] };
        const nr = { ...base };
        nr.extractedOutcomes = [...(nr.extractedOutcomes || []), newOutcome];
        const newIdx = nr.extractedOutcomes.length - 1;
        // ハイライト用にインデックス記録（3秒で消す）
        setTimeout(() => setHighlightNewIdx(null), 3000);
        setHighlightNewIdx(newIdx);
        // 新カードへスクロール
        setTimeout(() => {
          const el = document.getElementById(`outcome-card-${newIdx}`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
        return nr;
      });
      showToast(`✅ 「${newOutcome.actualOutcomeName}」を追加`, 'success');
    } catch (e) {
      console.error(e);
      showToast(`抽出失敗: ${e.message}`, 'error');
    } finally {
      setExtractingFromSelection(false);
    }
  };

  // 1アウトカムだけを再抽出（数値強化プロンプト）
  const reVerifyOutcome = async (idx) => {
    if (!apiKeys?.length) { showToast("再抽出にはAPIキーが必要", "error"); return; }
    const oc = result.extractedOutcomes[idx];
    showToast(`${model} で「${oc.actualOutcomeName}」を数値再抽出中...`, "info");
    try {
      const pdfText = await extractPdfText(pdfFile);
      const rotator = makeKeyRotator(apiKeys);
      // 再抽出プロンプトは extraction-algorithm.js に集約
      const focusPrompt = window.ExtractionAlgorithm.buildReVerifyPrompt({ outcome: oc, pdfText });

      let actualReModel = model;
      const v = await callGemini({
        rotator, model,
        systemPrompt: window.ExtractionAlgorithm.NUMERIC_FOCUSED_SYSTEM_PROMPT,
        userText: focusPrompt,
        thinkingBudget: 0,
        onNotice: (m) => showToast(m, 'info'),
        onModelUsed: (m) => { actualReModel = m; }
      });
      if (actualReModel !== model) {
        showToast(`📌 ${model} → ${actualReModel} に自動切替して再抽出`, 'info');
      }

      setResult(prev => {
        const nr = { ...prev };
        nr.extractedOutcomes = [...nr.extractedOutcomes];
        const cur = { ...nr.extractedOutcomes[idx] };
        // 既存値が空の所だけ上書き、既に値がある所は保持
        const mergeGroup = (curG, newG) => {
          const out = { ...(curG || {}) };
          Object.entries(newG || {}).forEach(([k, val]) => {
            if (val && val !== '-' && val !== '不明' && (!out[k] || out[k] === '-' || out[k] === '不明')) out[k] = val;
          });
          return out;
        };
        cur.interventionGroup = mergeGroup(cur.interventionGroup, v.interventionGroup);
        cur.comparisonGroup = mergeGroup(cur.comparisonGroup, v.comparisonGroup);
        cur.effectEstimate = mergeGroup(cur.effectEstimate, v.effectEstimate);
        if (v.evidenceText && (!cur.evidenceText || v.evidenceText.length > cur.evidenceText.length)) cur.evidenceText = v.evidenceText;
        if (v.evidenceTextJa && (!cur.evidenceTextJa || v.evidenceTextJa.length > cur.evidenceTextJa.length)) cur.evidenceTextJa = v.evidenceTextJa;
        if (v.notes) cur.notes = (cur.notes ? cur.notes + ' / ' : '') + '[再抽出] ' + v.notes;
        cur._reExtracted = true;
        nr.extractedOutcomes[idx] = cur;
        return nr;
      });
      showToast(`数値再抽出完了`, 'success');
    } catch (e) {
      showToast("再抽出失敗: " + e.message, "error");
    }
  };

  const copyOneTSV = (o) => { clipCopy(toDelimited(OC_HDRS, [outcomeRow(o)], "\t")) && showToast("TSVコピー完了"); };
  const copyOneCSV = (o) => { clipCopy(toDelimited(OC_HDRS, [outcomeRow(o)], ",")) && showToast("CSVコピー完了"); };
  const copyAllTSV = () => {
    if (!result) return;
    let t = "";
    if (result.baselineCharacteristics?.length) t += "[患者背景]\n" + toDelimited(BL_HDRS, result.baselineCharacteristics.map(baselineRow), "\t") + "\n\n";
    if (result.extractedOutcomes?.length) t += "[アウトカム]\n" + toDelimited(OC_HDRS, result.extractedOutcomes.map(outcomeRow), "\t");
    clipCopy(t) && showToast("全TSVコピー完了");
  };
  const copyAllCSV = () => {
    if (!result) return;
    let t = "";
    if (result.baselineCharacteristics?.length) t += toDelimited(BL_HDRS, result.baselineCharacteristics.map(baselineRow), ",") + "\n\n";
    if (result.extractedOutcomes?.length) t += toDelimited(OC_HDRS, result.extractedOutcomes.map(outcomeRow), ",");
    clipCopy(t) && showToast("全CSVコピー完了");
  };
  const copyBaselineTSV = () => { result?.baselineCharacteristics && clipCopy(toDelimited(BL_HDRS, result.baselineCharacteristics.map(baselineRow), "\t")) && showToast("患者背景TSVコピー完了"); };

  // === メタ分析ソフト連携用プレビュー（read-only / 副作用なし） ===
  // 抽出済み result.extractedOutcomes を変換した「表」をモーダルで表示。
  // ユーザーが内容を確認した後、TSV/CSV/Rスクリプト形式でクリップボードにコピー。
  // result への書き込みは一切行わない。既存の TSV/CSV/保存 ボタンとは独立。
  const openMetaPreview = (kind) => {
    if (!result?.extractedOutcomes?.length) { showToast("抽出済みアウトカムがありません", "error"); return; }
    const studyId = deriveStudyId(pdfFile?.name);
    const headers = kind === 'binary' ? REVMAN_BINARY_HDRS : REVMAN_CONT_HDRS;
    const rows = kind === 'binary'
      ? buildRevManBinaryRows(result.extractedOutcomes, studyId)
      : buildRevManContinuousRows(result.extractedOutcomes, studyId);
    if (rows.length === 0) {
      const label = kind === 'binary' ? '二値/Time-to-event' : '連続';
      showToast(`該当する${label}アウトカムがありません`, "error"); return;
    }
    setMetaPreview({ kind, studyId, headers, rows });
  };

  const copyMetaPreview = (format) => {
    if (!metaPreview) return;
    const { kind, studyId, headers, rows } = metaPreview;
    let payload = '', label = '';
    try {
      if (format === 'tsv') {
        payload = buildDelimitedTable(headers, rows, '\t');
        label = kind === 'binary' ? 'RevMan用 二値TSV' : 'RevMan用 連続TSV';
      } else if (format === 'csv') {
        payload = buildDelimitedTable(headers, rows, ',');
        label = kind === 'binary' ? 'RevMan用 二値CSV' : 'RevMan用 連続CSV';
      } else if (format === 'r') {
        const r = kind === 'binary'
          ? toRMetaforBinaryScript(result.extractedOutcomes, studyId)
          : toRMetaforContinuousScript(result.extractedOutcomes, studyId);
        payload = r.script;
        label = kind === 'binary' ? 'R metafor 二値スクリプト' : 'R metafor 連続スクリプト';
      } else {
        return;
      }
    } catch (e) {
      console.error(e); showToast(`変換失敗: ${e.message}`, 'error'); return;
    }
    if (!clipCopy(payload)) { showToast(`クリップボードコピー失敗`, 'error'); return; }
    showToast(`✅ ${label} をコピー (${rows.length}件) — 研究ID: ${studyId}`, 'success');
  };

  const saveSession = () => {
    const s = { pico, outcomes, result, model, keyCount: apiKeys.length, timestamp: new Date().toISOString() };
    const b = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `meta-extract-v3-${Date.now()}.json`;
    a.click();
    showToast("保存完了");
  };


  return (
    <div className="flex flex-col h-full bg-slate-50 text-slate-800">
      <Toast toast={toast}/>
      <header className="bg-white/90 backdrop-blur-sm border-b border-slate-200 py-2 px-3 z-20 flex-shrink-0">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <button onClick={onBack} className="text-slate-400 hover:text-purple-600 p-0.5 transition-colors"><ChevronLeft size={20}/></button>
            <BrainIcon size={20} className="text-purple-700"/>
            <h1 className="text-sm sm:text-base font-bold text-slate-800">Meta-Analysis Data Extractor <span className="text-[10px] gradient-text font-mono font-bold">v3 Gemini</span></h1>
          </div>
          <div className="flex items-center gap-2">
            {/* モデル切替（結果画面からでも変更可能） */}
            <div className="flex items-center gap-1 bg-blue-50 border-2 border-blue-300 rounded-lg px-2 py-1 hover:border-blue-500 transition-colors shadow-sm" title="抽出モデルを切替（次回の抽出から適用）">
              <LayersIcon size={11} className="text-blue-700 flex-shrink-0"/>
              <select
                value={model}
                onChange={e => handleModelChange(e.target.value)}
                className="text-[11px] bg-transparent font-bold text-blue-900 outline-none cursor-pointer pr-1 max-w-[180px]"
              >
                {GEMINI_MODELS.map(m => (
                  <option key={m.id} value={m.id}>{m.name.replace(/\s*\(.+/, '')}{m.thinking ? ' 🧠' : ''}</option>
                ))}
              </select>
              {apiKeys.length > 1 && (
                <span className="text-blue-700 text-[10px] font-mono bg-blue-100 px-1 rounded flex-shrink-0">×{apiKeys.length}キー</span>
              )}
            </div>
            {/* API診断ボタン: DevTools 不要で全API通信を確認 */}
            <button onClick={() => setShowDiag(true)} title="全API通信ログを表示（DevTools不要）"
              className="text-[10px] bg-slate-800 hover:bg-slate-900 text-white px-2 py-1 rounded flex items-center gap-1 font-bold transition-colors">
              <Activity size={12}/>診断
            </button>
            {result && <button onClick={saveSession} className="text-[10px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-medium text-slate-600 transition-colors"><SaveIcon size={12}/>保存</button>}
          </div>
        </div>
      </header>

      {showDiag && <ApiDiagPanel onClose={() => setShowDiag(false)}/>}
      {metaPreview && <MetaPreviewModal preview={metaPreview} onClose={() => setMetaPreview(null)} onCopy={copyMetaPreview}/>}

      <main className={`flex-1 flex flex-col min-h-0 w-full overflow-hidden ${status==='complete'?'p-1.5 sm:p-3':''}`}>
        {status !== 'complete' && (
          <div className="flex-1 overflow-y-auto p-3 sm:p-5 max-w-4xl mx-auto w-full space-y-4 pb-10">
            <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in-up">
              <div className="bg-slate-100 px-4 py-2 border-b border-slate-200 flex items-center gap-2"><SettingsIcon size={15} className="text-slate-500"/><h2 className="font-semibold text-slate-700 text-xs">PICO設定</h2></div>
              <div className="p-3 space-y-2">
                {[["P (患者)", "p", "例: 心不全患者"], ["I (介入)", "i", "例: SGLT2阻害薬"], ["C (比較)", "c", "例: プラセボ"]].map(([l, k, ph]) => (
                  <div key={k}>
                    <label className="block text-[10px] font-medium text-slate-500 mb-0.5">{l}</label>
                    <input type="text" value={pico[k]} onChange={e => setPico({ ...pico, [k]: e.target.value })} className="w-full text-xs p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder={ph}/>
                  </div>
                ))}
              </div>
            </section>
            <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in-up fade-d1">
              <div className="bg-slate-100 px-4 py-2 border-b border-slate-200 flex items-center justify-between">
                <div className="flex items-center gap-2"><Database size={15} className="text-slate-500"/><h2 className="font-semibold text-slate-700 text-xs">優先アウトカム</h2></div>
                <button onClick={addOutcome} className="text-[10px] flex items-center gap-1 text-purple-600 hover:text-purple-800 font-medium transition-colors"><PlusIcon size={13}/>追加</button>
              </div>
              <div className="p-3 space-y-2 max-h-[35vh] overflow-y-auto">
                <div className="bg-purple-50 border border-purple-200 rounded p-2 text-[10px] text-purple-800">全アウトカムが自動抽出されます。ここは優先探索用です。空欄でも全自動抽出が動作します。</div>
                {outcomes.map((o, idx) => (
                  <div key={o.id} className="p-2 border border-slate-200 rounded bg-slate-50">
                    <div className="flex justify-between items-start mb-1">
                      <span className="text-[10px] font-bold text-slate-500">#{idx+1}</span>
                      {outcomes.length > 1 && <button onClick={() => removeOutcome(o.id)} className="text-slate-400 hover:text-red-500 transition-colors"><Trash2 size={13}/></button>}
                    </div>
                    <input type="text" value={o.name} onChange={e => changeOutcome(o.id, 'name', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded mb-1 focus:ring-2 focus:ring-purple-500 outline-none" placeholder="アウトカム名"/>
                    <textarea value={o.definition} onChange={e => changeOutcome(o.id, 'definition', e.target.value)} className="w-full text-[10px] p-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-purple-500 outline-none resize-none h-12" placeholder="定義・条件"/>
                  </div>
                ))}
              </div>
            </section>
            <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in-up fade-d2">
              <div className="p-4">
                <div className={`border-2 border-dashed rounded-xl p-5 text-center cursor-pointer transition-colors ${pdfFile?'border-purple-400 bg-purple-50':'border-slate-300 hover:border-slate-400 hover:bg-slate-50'}`} onDragOver={e => e.preventDefault()} onDrop={handleDrop} onClick={() => fileRef.current?.click()}>
                  <input type="file" ref={fileRef} onChange={handleFileSelect} accept="application/pdf" className="hidden"/>
                  {pdfFile ? (
                    <div className="flex flex-col items-center text-purple-700">
                      <FileText size={28} className="mb-1"/>
                      <span className="font-medium text-xs truncate w-full">{pdfFile.name}</span>
                      <span className="text-[10px] text-purple-500">{(pdfFile.size/1024/1024).toFixed(2)} MB</span>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center text-slate-500">
                      <UploadCloud size={28} className="mb-1 text-slate-400"/>
                      <span className="font-medium text-xs">PDFをドロップまたはクリック</span>
                    </div>
                  )}
                </div>
                <button onClick={startAnalysis} disabled={status==='running'} className="w-full mt-3 btn-shimmer disabled:bg-slate-300 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2 text-sm transition-all shadow-md">
                  {status === 'running' ? <><span className="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"/>解析中...</> : <><Sparkles size={16}/>抽出実行</>}
                </button>
              </div>
            </section>
            {status === 'running' && (
              <div className="fade-in-up">
                <StageIndicator currentStage={currentStage} progress={progress} message={statusMsg}/>
              </div>
            )}
            {status === 'idle' && !result && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center p-8 text-slate-400 fade-in-up fade-d3">
                <BrainIcon size={40} className="mb-3 opacity-20"/>
                <p className="text-sm font-medium text-slate-500">結果はここに表示されます</p>
              </div>
            )}
            {status === 'error' && errMsg && (
              <div className="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-xs whitespace-pre-wrap">
                <AlertCircle size={16} className="inline mr-1"/>{errMsg}
              </div>
            )}
          </div>
        )}

        {status === 'complete' && result && (
          <div className="flex flex-1 min-h-0 gap-2 split-h">
            <div className="w-full xl:w-[55%] h-full flex flex-col bg-white rounded-lg shadow border border-slate-200 overflow-hidden split-pane">
              <div className="flex items-center justify-between bg-slate-50 px-3 py-1.5 border-b border-slate-200 flex-shrink-0">
                <h2 className="font-bold text-xs text-slate-800 flex items-center gap-1.5"><Database size={14} className="text-purple-600"/>抽出データ
                  {result._criticConfidence && <span className="ml-1 bg-purple-100 text-purple-700 text-[9px] font-bold px-1.5 py-0.5 rounded">Critic信頼度 {result._criticConfidence}/100</span>}
                </h2>
                <div className="flex items-center gap-2">
                  <div className="flex items-center gap-1 bg-white border border-slate-200 rounded px-1.5 py-0.5">
                    <TypeIcon size={11} className="text-slate-400"/>
                    <button onClick={() => setLeftFontSize(s => Math.max(7, s-1))} className="text-slate-500 hover:text-purple-600 px-0.5 font-bold text-[10px]">−</button>
                    <span className="text-[9px] font-mono w-5 text-center text-slate-600">{leftFontSize}</span>
                    <button onClick={() => setLeftFontSize(s => Math.min(16, s+1))} className="text-slate-500 hover:text-purple-600 px-0.5 font-bold text-[10px]">+</button>
                  </div>
                  <button onClick={copyAllTSV} className="text-[9px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-bold"><CopyIcon size={10}/>TSV</button>
                  <button onClick={copyAllCSV} className="text-[9px] bg-white border border-slate-300 hover:bg-slate-50 px-2 py-1 rounded flex items-center gap-1 font-bold"><CopyIcon size={10}/>CSV</button>
                  {/* メタ分析ソフト連携: 抽出済データを表でプレビューしてからクリップボードへ */}
                  <select
                    title="メタ分析ソフト用にデータを変換して表で確認 → モーダル内のボタンで TSV/CSV/R形式コピー（既存抽出データへの書き換えなし）"
                    value=""
                    onChange={(e) => { const v = e.target.value; e.target.value = ''; if (v) openMetaPreview(v); }}
                    className="text-[9px] bg-emerald-50 border border-emerald-300 hover:bg-emerald-100 px-2 py-1 rounded font-bold text-emerald-800 cursor-pointer"
                  >
                    <option value="">📊 メタ分析用 ▼</option>
                    <option value="binary">二値 / Time-to-event をプレビュー</option>
                    <option value="continuous">連続アウトカムをプレビュー</option>
                  </select>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-2 sm:p-3 space-y-4" style={{fontSize:`${leftFontSize}px`}}>
                {/* Source info banner + Critic 結果 */}
                {result._sources && (
                  <div className="bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-lg px-3 py-2 flex items-start gap-2" style={{fontSize:`${Math.max(11,leftFontSize*0.9)}px`}}>
                    <BrainIcon size={16} className="text-purple-600 flex-shrink-0 mt-0.5"/>
                    <div className="flex-1">
                      <div className="font-bold text-purple-900 flex items-center gap-2">
                        抽出ソース:
                        {result._criticConfidence != null && (
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${result._criticConfidence >= 80 ? 'bg-emerald-100 text-emerald-800 border border-emerald-300' : result._criticConfidence >= 60 ? 'bg-amber-100 text-amber-800 border border-amber-300' : 'bg-red-100 text-red-800 border border-red-300'}`}>
                            <ShieldCheckIcon size={10} className="inline mr-0.5"/>Critic信頼度: {result._criticConfidence}/100
                          </span>
                        )}
                      </div>
                      <div className="text-purple-800">{result._sources.join(' + ')}</div>
                      {result._criticAssessment && (
                        <div className="mt-1 text-slate-700 text-[11px]"><b>Critic評価:</b> {result._criticAssessment}</div>
                      )}
                      {result._criticIssues?.length > 0 && (
                        <details className="mt-1 text-[11px]">
                          <summary className="cursor-pointer text-amber-800 font-semibold">⚠ Critic が発見した問題 ({result._criticIssues.length}件)</summary>
                          <ul className="mt-1 list-disc pl-5 text-amber-900">{result._criticIssues.map((iss, i) => <li key={i}>{iss}</li>)}</ul>
                        </details>
                      )}
                      {result._criticAddedOutcomes?.length > 0 && (
                        <div className="mt-1 text-[11px] text-emerald-800"><b>+ Critic が追加発見:</b> {result._criticAddedOutcomes.join(', ')}</div>
                      )}
                      {result._criticError && (
                        <div className="mt-1 text-[11px] text-orange-700">⚠ Critic監査スキップ: {result._criticError.substring(0, 100)}</div>
                      )}
                      {result._supplementError && (
                        <div className="mt-1 text-[11px] text-orange-700">⚠ 補完抽出スキップ（核心データは取得済）: {result._supplementError.substring(0, 80)}</div>
                      )}
                      {result._errors?.length > 0 && <div className="mt-1 text-amber-800"><b>部分エラー:</b> {result._errors.join(' / ')}</div>}
                    </div>
                  </div>
                )}

                {/* 抽出品質サマリー */}
                {(() => {
                  const ocs = result.extractedOutcomes || [];
                  if (!ocs.length) return null;
                  const numFields = ['n_total', 'events_or_mean', 'sd_or_se'];
                  let totalCells = 0, filledCells = 0, allEmpty = 0;
                  ocs.forEach(o => {
                    let f = 0;
                    numFields.forEach(k => {
                      totalCells += 2;
                      if (o.interventionGroup?.[k] && o.interventionGroup[k] !== '-' && o.interventionGroup[k] !== '不明') { filledCells++; f++; }
                      if (o.comparisonGroup?.[k] && o.comparisonGroup[k] !== '-' && o.comparisonGroup[k] !== '不明') { filledCells++; f++; }
                    });
                    if (o.effectEstimate?.value && o.effectEstimate.value !== '-' && o.effectEstimate.value !== '不明') { filledCells++; f++; }
                    totalCells++;
                    if (f === 0) allEmpty++;
                  });
                  const ratio = totalCells > 0 ? filledCells / totalCells : 0;
                  const pct = Math.round(ratio * 100);
                  const isLow = ratio < 0.4 || allEmpty > ocs.length * 0.3;
                  return (
                    <div className={`rounded-lg px-3 py-2.5 border-2 ${isLow ? 'bg-red-50 border-red-300' : ratio < 0.7 ? 'bg-amber-50 border-amber-300' : 'bg-emerald-50 border-emerald-300'}`} style={{fontSize:`${Math.max(11,leftFontSize*0.9)}px`}}>
                      <div className="flex items-center justify-between mb-1.5">
                        <div className="flex items-center gap-2">
                          {isLow ? <AlertCircle size={16} className="text-red-600"/> : ratio < 0.7 ? <AlertCircle size={16} className="text-amber-600"/> : <CheckCircle2 size={16} className="text-emerald-600"/>}
                          <span className={`font-bold ${isLow ? 'text-red-900' : ratio < 0.7 ? 'text-amber-900' : 'text-emerald-900'}`}>
                            数値抽出率: <span className="font-mono text-base">{pct}%</span>
                            <span className="text-[11px] font-normal ml-2">({filledCells} / {totalCells} 項目, アウトカム {ocs.length}件中 数値ゼロは {allEmpty}件)</span>
                          </span>
                        </div>
                        <button
                          onClick={startAnalysis}
                          disabled={status === 'running'}
                          className="text-[11px] bg-purple-600 hover:bg-purple-700 disabled:bg-slate-300 text-white font-bold px-3 py-1 rounded flex items-center gap-1">
                          <RefreshIcon size={11}/>全体を再抽出
                        </button>
                      </div>
                      {isLow && (
                        <div className="text-red-800 text-[11px] mt-1 leading-relaxed">
                          ⚠️ <b>数値の抽出が不十分です。</b>以下のいずれかをお試しください:
                          <ul className="list-disc pl-5 mt-1 space-y-0.5">
                            <li><b>図表対応モデル（Gemini 2.5 Flash Lite）</b>に切替 → 図/表の数値も読み取れます</li>
                            <li>下の各カードで赤斜線セルをクリックして手入力</li>
                            <li>「全体を再抽出」で再試行（プロンプトが強化されています）</li>
                          </ul>
                        </div>
                      )}
                    </div>
                  );
                })()}

                <section className="border border-slate-200 rounded-lg overflow-hidden">
                  <div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700" style={{fontSize:`${leftFontSize}px`}}>PICO比較</h3></div>
                  <table className="w-full">
                    <thead className="bg-slate-50 text-slate-500 border-b">
                      <tr>
                        <th className="px-2 py-1 text-left w-10">要素</th>
                        <th className="px-2 py-1 text-left border-l border-slate-200">設定</th>
                        <th className="px-2 py-1 text-left border-l border-slate-200 bg-blue-50/50">論文</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {[["P", "p", "P"], ["I", "i", "I"], ["C", "c", "C"]].map(([l, k, pk]) => (
                        <tr key={k}>
                          <td className="px-2 py-1 font-medium">{l}</td>
                          <td className="px-2 py-1 border-l border-slate-200">{pico[k] || "-"}</td>
                          <td className="px-2 py-1 border-l border-slate-200 bg-blue-50/20">{result.paperPICO?.[pk] || "不明"}</td>
                        </tr>
                      ))}
                      {result.paperPICO?.thirdGroup && <tr><td className="px-2 py-1 font-medium text-purple-700">3群</td><td className="px-2 py-1 border-l border-slate-200">-</td><td className="px-2 py-1 border-l border-slate-200 bg-purple-50/30 font-medium text-purple-800">{result.paperPICO.thirdGroup}</td></tr>}
                      {result.paperPICO?.followUpDuration && <tr><td className="px-2 py-1 font-medium text-slate-500">追跡</td><td className="px-2 py-1 border-l border-slate-200">-</td><td className="px-2 py-1 border-l border-slate-200">{result.paperPICO.followUpDuration}</td></tr>}
                    </tbody>
                  </table>
                </section>

                {result.consortFlow && (
                  <section className="border border-indigo-200 rounded-lg overflow-hidden">
                    <div className="bg-indigo-50 px-2 py-1 border-b border-indigo-200"><h3 className="font-semibold text-indigo-800">🌀 CONSORT Flow</h3></div>
                    <table className="w-full" style={{fontSize:`${Math.max(9,leftFontSize*0.9)}px`}}>
                      <tbody className="divide-y divide-slate-100">
                        <tr><td className="px-2 py-0.5 text-slate-600">無作為化 N</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.randomized || "-"}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">割付 (介入/対照/3群)</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.allocatedIntervention || "-"} / {result.consortFlow.allocatedComparison || "-"}{result.consortFlow.allocatedThird ? ` / ${result.consortFlow.allocatedThird}` : ""}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">ITT解析 N</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.analyzedITT_intervention || "-"} / {result.consortFlow.analyzedITT_comparison || "-"}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">PP解析 N</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.analyzedPP_intervention || "-"} / {result.consortFlow.analyzedPP_comparison || "-"}</td></tr>
                        <tr><td className="px-2 py-0.5 text-slate-600">脱落 (介入/対照)</td><td className="px-2 py-0.5 font-medium">{result.consortFlow.lostToFollowUp_intervention || "-"} / {result.consortFlow.lostToFollowUp_comparison || "-"}</td></tr>
                      </tbody>
                    </table>
                  </section>
                )}

                {result.baselineCharacteristics?.length > 0 && (
                  <section className="border border-emerald-200 rounded-lg overflow-hidden">
                    <div className="bg-emerald-50 px-2 py-1 border-b border-emerald-200 flex items-center justify-between">
                      <h3 className="font-semibold text-emerald-800">👥 患者背景</h3>
                      <button onClick={copyBaselineTSV} className="bg-white border border-emerald-300 px-1.5 py-0.5 rounded font-medium text-emerald-700 hover:bg-emerald-100" style={{fontSize:`${Math.max(8,leftFontSize*0.8)}px`}}><CopyIcon size={9} className="inline mr-0.5"/>TSV</button>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full whitespace-nowrap">
                        <thead className="bg-slate-50 text-slate-500 border-b">
                          <tr>
                            <th className="px-1.5 py-1 text-left border-r sticky left-0 bg-slate-50 z-10 min-w-[80px]">変数</th>
                            <th className="px-1 py-1 text-center border-r" colSpan="3">介入群</th>
                            <th className="px-1 py-1 text-center border-r" colSpan="3">対照群</th>
                            <th className="px-1 py-1 text-center">P値</th>
                          </tr>
                          <tr className="bg-slate-100 border-b" style={{fontSize:`${Math.max(7,leftFontSize*0.75)}px`}}>
                            <th className="px-1.5 py-0.5 border-r sticky left-0 bg-slate-100 z-10"/>
                            {["N","値","SD/%","N","値","SD/%"].map((h,i)=><th key={i} className="px-1 py-0.5 text-center border-r font-medium">{h}</th>)}
                            <th className="px-1 py-0.5 text-center"/>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {result.baselineCharacteristics.map((b, idx) => (
                            <tr key={idx} className="hover:bg-blue-50/30">
                              <td className="px-1.5 py-1 border-r font-medium text-slate-800 sticky left-0 bg-white z-10">
                                {b.variable}
                                {b.unit && <span className="text-slate-400 ml-0.5">({b.unit})</span>}
                                {b.pageNumber && <span className="text-slate-400 ml-0.5 font-mono" style={{fontSize:`${Math.max(6,leftFontSize*0.65)}px`}}>P{b.pageNumber}</span>}
                              </td>
                              <td className="px-1 py-1 border-r text-center">{b.interventionGroup?.n || "-"}</td>
                              <td className="px-1 py-1 border-r text-center font-medium text-blue-700">{b.interventionGroup?.value || "-"}</td>
                              <td className="px-1 py-1 border-r text-center text-slate-500">{b.interventionGroup?.sd || b.interventionGroup?.percent || b.interventionGroup?.iqr || "-"}</td>
                              <td className="px-1 py-1 border-r text-center">{b.comparisonGroup?.n || "-"}</td>
                              <td className="px-1 py-1 border-r text-center font-medium text-blue-700">{b.comparisonGroup?.value || "-"}</td>
                              <td className="px-1 py-1 border-r text-center text-slate-500">{b.comparisonGroup?.sd || b.comparisonGroup?.percent || b.comparisonGroup?.iqr || "-"}</td>
                              <td className="px-1 py-1 text-center">{b.pValue && b.pValue !== "-" ? <span className={`font-mono ${parseFloat(b.pValue)<0.05?'text-red-600 font-bold':'text-slate-600'}`}>{b.pValue}</span> : "-"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="px-2 py-1 bg-slate-50 border-t border-slate-200 text-slate-500 flex justify-between" style={{fontSize:`${Math.max(8,leftFontSize*0.8)}px`}}>
                      <span>{result.baselineCharacteristics.length}項目</span>
                      <span>出処: {result.baselineCharacteristics[0]?.sourceLocation || "Table 1等"}</span>
                    </div>
                  </section>
                )}

                <div className="space-y-3">
                  {result.extractedOutcomes?.map((oc, idx) => (
                    <OutcomeCard key={idx} oc={oc} idx={idx} pico={pico} onEdit={editOutcome}
                      onCopyTSV={copyOneTSV} onCopyCSV={copyOneCSV} fontSize={leftFontSize}
                      onHighlight={(o) => { setHlQuery(o.evidenceText); setHlPage(o.pageNumber); setPdfSearchText(o.evidenceText || ""); }}
                      onSendToSearch={sendToSearch}
                      onReVerify={apiKeys?.length ? reVerifyOutcome : null}
                      isNew={highlightNewIdx === idx}/>
                  ))}
                  {(!result.extractedOutcomes?.length) && <div className="text-center py-6 text-slate-500">データなし</div>}
                </div>

                {result.expertCommentary && (
                  <section className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-lg border border-indigo-100 overflow-hidden">
                    <div className="px-2 py-1.5 border-b border-indigo-100 flex items-center gap-1"><Sparkles size={12} className="text-indigo-600"/><h3 className="font-bold text-indigo-800">AI考察</h3></div>
                    <div className="p-2 text-indigo-900 leading-relaxed whitespace-pre-wrap">{result.expertCommentary}</div>
                  </section>
                )}

                {result.paperQualityAssessment && (
                  <section className="bg-gradient-to-br from-amber-50 to-orange-50 rounded-lg border border-amber-200 overflow-hidden">
                    <div className="px-2 py-1.5 border-b border-amber-200 flex items-center gap-1"><ShieldIcon size={12} className="text-amber-600"/><h3 className="font-bold text-amber-800">論文品質評価</h3></div>
                    <div className="p-2 text-amber-900 leading-relaxed whitespace-pre-wrap">{result.paperQualityAssessment}</div>
                  </section>
                )}

                <div className="grid grid-cols-2 gap-2">
                  <section className="bg-white rounded-lg border border-slate-200 overflow-hidden">
                    <div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700">統計手法</h3></div>
                    <ul className="p-2 list-disc pl-4 text-slate-600 space-y-0.5">
                      {result.statisticalMethods?.length ? result.statisticalMethods.map((m, i) => <li key={i}>{m}</li>) : <li className="text-slate-400 list-none">不明</li>}
                    </ul>
                  </section>
                  <section className="bg-white rounded-lg border border-slate-200 overflow-hidden">
                    <div className="bg-slate-100 px-2 py-1 border-b"><h3 className="font-semibold text-slate-700 flex items-center gap-1"><AlertCircle size={10} className="text-amber-500"/>不明点・要確認</h3></div>
                    <ul className="p-2 list-disc pl-4 text-slate-600 space-y-0.5">
                      {result.unclearItems?.length ? result.unclearItems.map((x, i) => <li key={i}>{x}</li>) : <li className="text-slate-400 list-none">なし</li>}
                    </ul>
                  </section>
                </div>
              </div>
            </div>

            <div className="w-full xl:w-[45%] h-full flex flex-col bg-slate-200 rounded-lg border border-slate-300 shadow-inner overflow-hidden relative split-pane">
              <div className="bg-slate-800 text-slate-200 text-[9px] px-2 py-1.5 flex items-center justify-between z-10 flex-shrink-0 gap-2">
                <span className="flex items-center gap-1 font-mono truncate max-w-[20%]"><FileText size={11}/>{pdfFile?.name}</span>
                <div className="flex items-center gap-1.5 flex-wrap">
                  {/* 選択モード切替（大型・色分け） */}
                  <div className="flex items-center gap-0 bg-slate-900 p-1 rounded-lg shadow-inner ring-1 ring-slate-600" title="文章 = テキストモード／図・表・グラフ = 範囲モード">
                    <button onClick={() => setPdfSelectionMode('text')}
                            className={`px-2.5 py-1 rounded text-[11px] font-bold flex items-center gap-1 transition-all ${pdfSelectionMode === 'text' ? 'bg-blue-500 text-white shadow' : 'text-slate-400 hover:bg-slate-700'}`}>
                      <TypeIcon size={12}/>📝 文章選択
                    </button>
                    <button onClick={() => setPdfSelectionMode('area')}
                            className={`px-2.5 py-1 rounded text-[11px] font-bold flex items-center gap-1 transition-all ${pdfSelectionMode === 'area' ? 'bg-purple-500 text-white shadow' : 'text-slate-400 hover:bg-slate-700'}`}>
                      <TargetIcon size={12}/>🔲 図・表選択
                    </button>
                  </div>
                  {extractingFromSelection && <span className="bg-purple-600 text-white px-1.5 py-0.5 rounded font-bold text-[9px] flex items-center gap-1 animate-pulse"><Sparkles size={9}/>抽出中</span>}
                  {hlQuery ? <span className="bg-yellow-400 text-yellow-900 px-1 py-0.5 rounded font-bold text-[8px] animate-pulse">HL</span> : null}
                  <div className="flex items-center gap-0.5 bg-slate-700 p-0.5 rounded">
                    <button onClick={() => setPdfScale(s => Math.max(0.4, s-0.2))} className="p-0.5 hover:bg-slate-500 rounded text-slate-300"><ZoomOutIcon size={11}/></button>
                    <span className="font-mono w-7 text-center text-[9px]">{Math.round(pdfScale*100)}%</span>
                    <button onClick={() => setPdfScale(s => Math.min(3, s+0.2))} className="p-0.5 hover:bg-slate-500 rounded text-slate-300"><ZoomInIcon size={11}/></button>
                  </div>
                </div>
              </div>

              {/* モード説明バー（図・表モードは強調色） */}
              <div className={`px-3 py-1.5 text-[11px] flex items-center gap-2 border-b ${pdfSelectionMode === 'area' ? 'bg-purple-100 border-purple-400 text-purple-900' : 'bg-blue-50 border-blue-300 text-blue-900'}`}>
                {pdfSelectionMode === 'area' ? (
                  <>
                    <TargetIcon size={14} className="text-purple-700"/>
                    <span><b>🔲 図・表選択モード:</b> PDF上で<b>マウスをドラッグ</b>して図・表を囲む → 「この範囲から抽出」ボタンで AI が画像から1アウトカム抽出 → カードに追加</span>
                  </>
                ) : (
                  <>
                    <TypeIcon size={14} className="text-blue-700"/>
                    <span><b>📝 文章選択モード:</b> PDF文章を選ぶ → 「選択箇所を抽出」ボタン。<b className="bg-purple-200 text-purple-900 px-1 rounded">図・表は左の「🔲図・表選択」に切替か、Shiftキー押しながらドラッグ</b></span>
                  </>
                )}
              </div>

              <div className="bg-slate-700 px-2 py-1.5 flex items-center gap-1.5 z-10 flex-shrink-0 border-b border-slate-600">
                <SearchIcon size={13} className="text-slate-400 flex-shrink-0"/>
                <input type="text" value={pdfSearchText} onChange={e => setPdfSearchText(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') executePdfSearch(); }}
                  placeholder="テキストを貼り付けてEnterまたは検索..."
                  className="flex-1 bg-slate-600 text-white text-[10px] px-2 py-1 rounded border border-slate-500 focus:outline-none focus:border-purple-400 placeholder-slate-400 font-mono"/>
                <button onClick={executePdfSearch} className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-[9px] font-bold px-2 py-1 rounded flex items-center gap-0.5 flex-shrink-0"><TargetIcon size={10}/>検索</button>
                <button onClick={() => { document.querySelectorAll('.highlight-hook').forEach(el => el.classList.remove('highlight-hook')); setPdfSearchText(""); setHlQuery(""); showToast("ハイライト解除"); }} className="text-slate-400 hover:text-white text-[9px] px-1 py-1 rounded flex-shrink-0" title="クリア"><XCircle size={12}/></button>
              </div>

              <div className="flex-1 overflow-auto relative bg-slate-300">
                <PdfViewer file={pdfFile} searchQuery={hlQuery} targetPage={hlPage} onToast={showToast} scale={pdfScale}
                  selectionMode={pdfSelectionMode}
                  onExtractFromSelection={extractFromSelection}
                  extracting={extractingFromSelection}/>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

/* ============================================================
   SECTION 14: ROOT
   ============================================================ */
function App() {
  const [page, setPage] = useState("setup");
  const [apiKeys, setApiKeys] = useState([]);
  const [model, setModel] = useState(GEMINI.defaultModel);
  const [initialConfig] = useState(() => loadConfig());

  const handleSetupComplete = ({ apiKeys, model }) => {
    // 二重防御: 無効モデルIDが渡された場合はデフォルトに戻す
    const validModel = GEMINI_MODELS.find(m => m.id === model) ? model : GEMINI.defaultModel;
    setApiKeys(apiKeys);
    setModel(validModel);
    setPage("main");
  };

  if (page === "setup") return <SetupPage onComplete={handleSetupComplete} initialConfig={initialConfig}/>;
  return <ExtractorPage apiKeys={apiKeys} model={model} onBack={() => setPage("setup")}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
