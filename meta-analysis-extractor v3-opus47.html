const {
  SYSTEM_PROMPT_EXTRACT,
  SYSTEM_PROMPT_CRITIC,
  SYSTEM_PROMPT_VERIFY,
  CRITIC_PIPELINE_SYSTEM_PROMPT,
  NUMERIC_FOCUSED_SYSTEM_PROMPT,

/* ============================================================

const {

/* ============================================================

   ============================================================ */
// Google AI Studio で利用可能なモデル一覧（2026年4月時点の無料枠の実測値）
// ※ Gemma は textOnly: PDFや画像入力非対応 → 抽出済みテキストのみで処理
// ※ Gemini 2.5 Flash 系は RPD=20/日と厳しいが、マルチモーダル対応
// ※ Gemini 2.5 Pro は無料枠なし（Billing 有効化必要）
// 精度重視の構成：Flash Lite (推奨) と Flash の2モデルのみ
// 各モデル無料枠 = 20 req/日。本アプリは 1論文 = 3 req（核心+補完+Critic監査）

];

// 503/429 で本モデルが詰まった時の自動フォールバック先
const FALLBACK_CHAIN = {
  "gemini-2.5-flash-lite": ["gemini-2.5-flash"],
  "gemini-2.5-flash":      ["gemini-2.5-flash-lite"]

const GEMINI = {
  name: "Google Gemini (AI Studio)",

  defaultModel: "gemini-2.5-flash-lite",

// 複数キーを順番に使うラウンドロビン（同プロジェクトのキーは枠を共有しますが、別プロジェクトのキーなら無料枠が掛け算で増えます）
function makeKeyRotator(keys) {
  const list = (Array.isArray(keys) ? keys : [keys]).map(k => (k || '').trim()).filter(Boolean);
  let idx = 0;
  return {
    size: list.length,
    next() { if (!list.length) return null; const k = list[idx % list.length]; idx++; return k; },
    all() { return list.slice(); }
  };
}

// Critic 役の選択（Gemini のみなので最高 priority のモデルを返す。Pro が設定されていなければ Flash）
function pickCriticModel(extractionModel) {
  if (extractionModel === "gemini-2.5-pro") return "gemini-2.5-pro";
  // 抽出が Flash 系なら Critic は一段上の Pro を試したい
  return "gemini-2.5-pro";
}

// Critic/Verify 用の呼び出し（Geminiのみ）
async function callCriticAnyProvider(rotator, model, systemPrompt, userText, pdfBase64, images, thinkingBudget, criticSchema, onNotice) {
  return await callGemini({
    rotator, model,
    systemPrompt, userText, images, pdfBase64,
    schema: criticSchema ? toGeminiSchema(criticSchema) : null,
    thinkingBudget: Math.min(thinkingBudget || 0, 12000),
    onNotice
  });
}

// ============================================================
// API診断ログ（モジュールレベル + リアクティブ購読）
// アプリ内パネルでDevTools不要で全API通信を確認できる
// ============================================================
const __apiLog = [];
const __apiLogListeners = [];
const MAX_API_LOG = 100;

function pushApiLog(entry) {
  __apiLog.push({ ...entry, ts: new Date() });
  if (__apiLog.length > MAX_API_LOG) __apiLog.shift();
  __apiLogListeners.forEach(fn => { try { fn([...__apiLog]); } catch (e) {} });
}
function useApiLog() {
  const [log, setLog] = useState([...__apiLog]);
  useEffect(() => {
    __apiLogListeners.push(setLog);
    return () => {
      const i = __apiLogListeners.indexOf(setLog);
      if (i >= 0) __apiLogListeners.splice(i, 1);
    };
  }, []);
  return log;
}

// fetch を1回だけ実行。リトライ可能性 (kind) と待機ヒント秒数 (retryAfterSec) を返す
// url は診断ログ用にも参照される（key= 部分はマスク）
async function singleFetch(url, options) {
  const t0 = Date.now();
  const maskedUrl = url.replace(/key=[^&]+/, 'key=***');
  const modelMatch = url.match(/\/models\/([^:?]+)/);
  const modelName = modelMatch ? modelMatch[1] : '?';
  // ★ 診断: 全リクエストを console に記録（ブラウザ DevTools で確認可能）
  try { console.log(`[Gemini API →] ${maskedUrl}`); } catch (e) {}
  pushApiLog({ phase: 'request', model: modelName, url: maskedUrl });
  let resp;
  try { resp = await fetch(url, options); }
  catch (e) {
    // ネットワークエラー
    return { ok: false, kind: 'network', message: e.message || 'network error', retryAfterSec: 0, status: 0 };
  }

  if (resp.ok) {
    try {
      const data = await resp.json();
      pushApiLog({ phase: 'response', model: modelName, status: 200, ok: true, durationMs: Date.now() - t0 });
      return { ok: true, data };
    }
    catch (e) {
      pushApiLog({ phase: 'response', model: modelName, status: resp.status, ok: false, error: 'JSONパース失敗', durationMs: Date.now() - t0 });
      return { ok: false, kind: 'fatal', message: 'JSONパース失敗: ' + e.message, status: resp.status };
    }
  }

  // エラーボディの読み取り
  let body = {};
  try { body = await resp.json(); } catch (e) {}
  const msg = body.error?.message || body.error?.status || resp.statusText || '';

  // Retry-After ヘッダー or エラー本文の retryDelay を秒数化
  let retryAfterSec = 0;
  const ra = resp.headers.get('retry-after');
  if (ra) {
    const n = parseInt(ra, 10);
    if (!isNaN(n)) retryAfterSec = n;
    else { const dt = Date.parse(ra); if (!isNaN(dt)) retryAfterSec = Math.max(0, Math.round((dt - Date.now()) / 1000)); }
  }
  const rd = body.error?.details?.find?.(d => d['@type']?.includes?.('RetryInfo'))?.retryDelay;
  if (rd && !retryAfterSec) {
    const m = String(rd).match(/(\d+(?:\.\d+)?)s/);
    if (m) retryAfterSec = Math.ceil(parseFloat(m[1]));
  }

  // 種別判定（status コード優先。キーワード一致は補助的にしか使わない）
  const status = resp.status;
  const overloaded = status === 503;  // ★ 厳密に 503 のみ
  const rateLimit = status === 429;   // ★ 厳密に 429 のみ
  const auth = status === 401 || status === 403;
  const badReq = status === 400 || status === 404;

  // 429 のサブ種別とメタ情報を判定
  const quotaViolation = body.error?.details?.find?.(d => d['@type']?.includes?.('QuotaFailure'))?.violations?.[0];
  const quotaId = quotaViolation?.quotaId || '';
  const quotaMetric = quotaViolation?.quotaMetric || '';
  const fullQuotaInfo = `${quotaId} ${quotaMetric}`.toLowerCase();
  // ラベルは "PerDay" だが retry-after が短い (≤5分) なら実態は短期バースト制限
  // → Google の汎用 quotaId に騙されず、retry-after を真実とする
  const labelSaysDaily = rateLimit && (/per.?day|requests.?per.?day|daily/i.test(fullQuotaInfo) || /per.?day|RPD|daily/i.test(msg));
  const isDailyQuota = labelSaysDaily && (retryAfterSec === 0 || retryAfterSec > 300); // retry-after なし or 5分超 → 真の日次
  const isShortBurst = labelSaysDaily && retryAfterSec > 0 && retryAfterSec <= 300;     // PerDay ラベル + 短期 retry → 一時的バースト制限
  const isTpmQuota = rateLimit && (/InputTokensPerMinute|InputTokensPerProject/i.test(fullQuotaInfo) || /TPM|tokens.?per.?minute|input.?tokens/i.test(msg));
  const isRpmQuota = rateLimit && (/GenerateContentRequestsPerMinute|RequestsPerMinute/i.test(fullQuotaInfo) || /RPM|requests.?per.?minute/i.test(msg));

  let kind = 'fatal';
  if (auth) kind = 'auth';
  else if (overloaded) kind = 'overloaded';     // 503 → モデル過負荷。フォールバック推奨
  else if (rateLimit) kind = 'ratelimit';       // 429 → レート制限。キー切替 or 待機
  else if (status >= 500) kind = 'server';       // 5xx → リトライ
  else if (badReq) kind = 'fatal';
  else kind = 'fatal';

  // ★ 診断: コンソールに全 4xx/5xx を生で記録（ブラウザの DevTools で確認可能）
  if (status >= 400) {
    try {
      console.warn(`[Gemini API ${status}] kind=${kind}`, {
        url: url.replace(/key=[^&]+/, 'key=***'),
        status, msg, retryAfterSec, quotaId, quotaMetric, body
      });
    } catch (e) {}
  }
  // アプリ内診断パネルに記録
  pushApiLog({
    phase: 'response', model: modelName, status, ok: false, kind,
    error: msg.substring(0, 200), retryAfterSec, quotaId, quotaMetric,
    durationMs: Date.now() - t0
  });

  return { ok: false, kind, status, message: `${status} ${msg}`.trim(), retryAfterSec, isDailyQuota, isShortBurst, isTpmQuota, isRpmQuota, quotaId };
}

// 503/429 を加味した待機（ジッタ付き）
function backoffMs(attempt, kind, retryAfterSec) {
  if (retryAfterSec > 0) return Math.min(retryAfterSec * 1000 + Math.random() * 500, 60000);
  // overloaded は長め。それ以外は通常指数バックオフ
  const base = kind === 'overloaded' ? 6000 : kind === 'ratelimit' ? 8000 : 1500;
  const exp = base * Math.pow(2, attempt);
  const jitter = Math.random() * exp * 0.4;
  return Math.min(exp + jitter, 45000);
}

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// 不完全 JSON (途中で切れた、末尾カンマ等) を救出する堅牢パーサ
// スタックで括弧の対応関係を追跡し、配列内の最後の完成した要素まで遡って復旧する
function bestEffortJsonParse(text) {
  let s = (text || '').trim();
  // markdown フェンス除去
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
  if (!s) throw new Error("空の応答");

  // ① 直接パース成功するなら返す
  try { return JSON.parse(s); } catch (e) {}

  // ② スタックベースで全位置の状態を記録、安全な切り詰め点を集める
  const stack = []; // 開いた括弧（'{' または '['）の LIFO スタック
  const checkpoints = []; // 配列内での要素境界（安全な切り詰め点）
  let inStr = false, escape = false;

  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (escape) { escape = false; continue; }
    if (c === '\\') { escape = true; continue; }
    if (inStr) {
      if (c === '"') inStr = false;
      continue;
    }
    if (c === '"') { inStr = true; continue; }
    if (c === '{' || c === '[') stack.push(c);
    else if (c === '}' || c === ']') {
      stack.pop();
      // 閉じた直後がチェックポイント（その時点でのスタック状態を記録）
      checkpoints.push({ pos: i + 1, openStack: stack.slice() });
    }
  }

  // ③ チェックポイントを新しい順に試して、閉じ括弧を補って parse
  // → 大きく切り詰めるほど多くを保持できる
  for (let i = checkpoints.length - 1; i >= 0; i--) {
    const cp = checkpoints[i];
    let candidate = s.substring(0, cp.pos);
    // 末尾のカンマや空白を除去
    candidate = candidate.replace(/,\s*$/g, '');
    // スタックを LIFO で閉じる
    for (let j = cp.openStack.length - 1; j >= 0; j--) {
      candidate += cp.openStack[j] === '{' ? '}' : ']';
    }
    try { return JSON.parse(candidate); } catch (e) {}
  }

  // ④ 最終手段: 文字列途中で切れた場合の復旧
  let fixed = s;
  if (inStr) fixed += '"';
  fixed = fixed.replace(/,\s*([}\]])/g, '$1').replace(/,\s*$/g, '');
  for (let j = stack.length - 1; j >= 0; j--) {
    fixed += stack[j] === '{' ? '}' : ']';
  }
  try { return JSON.parse(fixed); } catch (e) {}

  throw new Error(`JSON復旧失敗: 応答が${s.length}文字で破損 (チェックポイント${checkpoints.length}件試行)`);
}

// Gemini API 呼び出し（マルチキー・自動モデルフォールバック・賢いリトライ）
// onModelUsed: 成功時に実際に使われたモデル ID を呼び元に通知（フォールバック発生時の表示用）
async function callGemini({ rotator, model, systemPrompt, userText, pdfBase64, images, schema, thinkingBudget = 0, onNotice, onModelUsed }) {
  const keys = rotator.all();
  if (!keys.length) throw new Error("APIキーが設定されていません");

  const notice = (msg) => { try { onNotice && onNotice(msg); } catch (e) {} };
  let lastErr = null;
  // 各モデルの失敗理由を記録（最終 throw 時に正確に報告するため）
  const failureLog = [];

  // 試すモデルの順序（最初は指定モデル → 503 で詰まれば fallback chain）
  // 画像/PDFを含むコールの場合、テキスト専用モデル（Gemma 等）はフォールバック先から除外
  const hasMedia = (images && images.length > 0) || !!pdfBase64;
  const rawChain = [model, ...(FALLBACK_CHAIN[model] || [])];
  const modelChain = rawChain.filter(mid => {
    if (mid === model) return true; // 指定モデルは必ず試す
    const info = GEMINI_MODELS.find(x => x.id === mid);
    if (hasMedia && info?.textOnly) return false; // メディア含むコールでテキスト専用は除外
    return true;
  });

  for (let mIdx = 0; mIdx < modelChain.length; mIdx++) {
    const tryModel = modelChain[mIdx];
    const modelInfo = GEMINI_MODELS.find(m => m.id === tryModel) || {};
    if (mIdx > 0) notice(`⚠️ あなたが選択した ${model} が利用不可 → 自動で ${tryModel} に切替`);

    // モデルごとにリクエストボディを構築
    // - Gemma: textOnly + systemInstruction 非対応 → systemPrompt をユーザーメッセージに統合
    // - Gemini: マルチモーダル + systemInstruction 対応 → 通常通り
    const isMultimodal = !modelInfo.textOnly;
    const isGemma = /^gemma/i.test(tryModel);
    const effectiveUserText = isGemma
      ? `${systemPrompt}\n\n---\n\n【ユーザー指示】\n${userText}`
      : userText;

    const parts = [{ text: effectiveUserText }];
    if (isMultimodal) {
      if (pdfBase64 && /gemini/.test(tryModel)) {
        parts.push({ inlineData: { data: pdfBase64, mimeType: "application/pdf" } });
      }
      if (images) images.forEach(img => parts.push(img));
    }

    const genConfig = { temperature: 0.0, maxOutputTokens: modelInfo.maxOut || 8192 };
    if (schema && modelInfo.supportsSchema !== false) {
      genConfig.responseMimeType = "application/json";
      genConfig.responseSchema = schema;
    } else if (schema) {
      // Gemma: MIME のみ JSON 指定（schema 強制はしない）
      genConfig.responseMimeType = "application/json";
    }
    if (thinkingBudget > 0 && modelInfo.thinking) {
      genConfig.thinkingConfig = { thinkingBudget };
    }

    const requestBody = {
      contents: [{ role: "user", parts }],
      generationConfig: genConfig
    };
    // Gemma は systemInstruction 非対応 → 上で統合済み、フィールド自体を送らない
    if (!isGemma) {
      requestBody.systemInstruction = { parts: [{ text: systemPrompt }] };
    }
    const body = JSON.stringify(requestBody);

    // 各モデルで最大試行回数。
    // 最終モデル: 短期 429 を粘るため多め（5回）
    // それ以外: 短期バースト用に 4回（旧バージョンの粘り強さを再現）
    const isLastInChain = mIdx >= modelChain.length - 1;
    const maxAttempts = isLastInChain ? Math.max(5, keys.length * 2) : Math.max(4, keys.length * 2);
    let kIdx = 0;
    let consecutiveOverload = 0;
    let consecutiveAuth = 0;

    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const key = keys[kIdx % keys.length]; kIdx++;
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${tryModel}:generateContent?key=${key}`;

      const r = await singleFetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body
      });

      if (r.ok) {
        const text = r.data?.candidates?.[0]?.content?.parts?.find(p => p.text)?.text;
        if (!text) {
          const blockReason = r.data?.promptFeedback?.blockReason;
          if (blockReason) throw new Error(`応答ブロック (${blockReason}): 安全フィルタの可能性`);
          throw new Error("応答に本文なし（モデルが空応答を返しました）");
        }
        try {
          const parsed = bestEffortJsonParse(text);
          // 実際に成功したモデル ID を呼び元に通知（フォールバック発生時の表示精度のため）
          try { onModelUsed && onModelUsed(tryModel); } catch (e) {}
          return parsed;
        } catch (e) {
          throw new Error(`[${tryModel}] JSONパース失敗: ${e.message}\n応答先頭: ${text.substring(0, 200)}...`);
        }
      }

      lastErr = new Error(`[${tryModel}] ${r.message}`);

      // 認証エラー: 全キー試して全部ダメなら終了
      if (r.kind === 'auth') {
        consecutiveAuth++;
        if (consecutiveAuth >= keys.length) throw lastErr;
        notice(`🔑 キー#${(kIdx-1)%keys.length+1}が認証失敗 → 次のキーへ`);
        continue;
      }
      // 不正リクエスト等もリトライ不可
      if (r.kind === 'fatal') throw lastErr;

      // 429 のサブ種別判定（singleFetch から伝搬）
      const isDailyQuota = !!r.isDailyQuota;     // 真の日次クォータ枯渇 → 翌日まで回復不可
      const isShortBurst = !!r.isShortBurst;     // ★ PerDay ラベルだが retry-after が短期 → 一時的バースト制限
      const isTpmQuota = !!r.isTpmQuota;          // TPM 超過 → 1分待てば回復
      const isRpmQuota = !!r.isRpmQuota;          // RPM 超過 → 1分待てば回復
      const hasRealQuotaError = !!r.quotaId;     // quotaId あり = Google のクォータシステムが反応
      const veryLongWait = r.retryAfterSec > 90;  // サーバー指定 > 90s → 別モデル推奨
      const isLastModel = mIdx >= modelChain.length - 1;
      const isUserSelected = mIdx === 0;          // ユーザーが選択したモデル

      if (r.kind === 'ratelimit') {
        // ★ 真の日次クォータ枯渇（retry-after なし or > 5分）→ フォールバック or throw
        if (isDailyQuota) {
          failureLog.push({ model: tryModel, reason: `日次クォータ枯渇 (${r.quotaId || 'PerDay'})`, recoverable: 'tomorrow' });
          if (!isLastModel) {
            notice(`📅 ${tryModel} 日次クォータ枯渇 → 別モデルに切替`);
            break;
          } else {
            const dailyExhausted = failureLog.filter(f => f.reason.includes('日次')).map(f => f.model);
            const otherFailures = failureLog.filter(f => !f.reason.includes('日次'));
            let errMsg = `❌ 抽出失敗\n\n`;
            errMsg += `【日次枯渇 (翌日まで回復不可)】\n${dailyExhausted.map(m => `  ・${m}`).join('\n')}\n\n`;
            if (otherFailures.length) {
              errMsg += `【その他の失敗 (回復可能性あり)】\n${otherFailures.map(f => `  ・${f.model}: ${f.reason}`).join('\n')}\n\n`;
            }
            errMsg += `💡 対処:\n・翌日(UTC0時/日本朝9時)まで待機\n・別プロジェクトの API キーを追加して負荷分散\n・Google Cloud Billing 有効化で枠を大幅拡張`;
            throw new Error(errMsg);
          }
        }

        // ★ 短期バースト制限（PerDay ラベルだが retry-after 短期）
        // → Google 指示通り待って **同モデルで粘り強く再試行** する
        // → フォールバックも同プロジェクト枠を共有するため、切替えても効かない
        if (isShortBurst) {
          // 旧バージョンのように粘り強く: 最大3回まで待ってリトライ（合計待機 ≈100〜120秒）
          // ユーザーが「放置していたら急に動いた」と感じる挙動を実現
          if (attempt >= 3) {
            failureLog.push({ model: tryModel, reason: `短期バースト制限が3回連続継続 (${r.retryAfterSec}秒待機指示)`, recoverable: 'wait' });
            const sec = r.retryAfterSec;
            throw new Error(`⏰ Google が短期スロットリング中（quotaId=${r.quotaId}）\n\n` +
              `${tryModel} は ${sec}秒待機を指示しています。\n${attempt+1}回試行後も継続（合計約${(attempt+1)*sec}秒待機済み）。\n\n` +
              `💡 対処:\n・**1〜2分さらに待ってから** 抽出を再実行してください\n` +
              `・両モデルとも同じプロジェクトの無料枠を共有しているため、別モデルへの切替えは無効\n` +
              `・別プロジェクトのキーを追加 or 課金有効化で根本回避`);
          }
          notice(`⏰ ${tryModel} 短期バースト制限 [${attempt+1}/${4}回目] → Google指示の${r.retryAfterSec}秒待機後に同モデルで再試行（フォールバックは同枠共有で無効）`);
          // wait + retry セクションへ進む（同モデル再試行）
        } else if (hasRealQuotaError && !isLastModel) {
          // ★ その他の本物クォータエラー（TPM/RPM など）→ 即フォールバック
          failureLog.push({ model: tryModel, reason: `${isTpmQuota ? 'TPM' : isRpmQuota ? 'RPM' : '短期'} クォータ制限 (${r.quotaId})`, recoverable: 'wait' });
          notice(`⏸ ${tryModel} ${isTpmQuota ? 'TPM' : isRpmQuota ? 'RPM' : '短期'}クォータ制限 → 別モデルに切替`);
          break;
        }

        // 超長期待機指示 (>90s) → フォールバック
        if (veryLongWait && !isLastModel) {
          failureLog.push({ model: tryModel, reason: `超長期待機要 (${r.retryAfterSec}秒)`, recoverable: 'wait' });
          notice(`⏳ ${tryModel} 超長期待機要 (${r.retryAfterSec}秒) → 別モデルに切替`);
          break;
        }

        // 透過的 429 (quotaId なし、edge制限など) → 短期リトライで回復可能性あり
        // ユーザー選択モデルは2回まで、フォールバック先は1回まで
        const giveUpAt = isUserSelected ? 2 : 1;
        if (attempt >= giveUpAt && !isLastModel) {
          failureLog.push({ model: tryModel, reason: `透過的レート制限 (${attempt+1}回失敗)`, recoverable: 'wait' });
          notice(`⏳ ${tryModel} レート制限継続 → 別モデルに切替`);
          break;
        }
        // ★ 最終モデルでも、短期 429 (TPM等) なら 3回まで粘る (待機累計 ≈40秒)
        // ※ quotaId があるエラーは上で既に throw 済みなので、ここに来るのは透過的 429 のみ
        if (isLastModel && attempt >= 3) {
          failureLog.push({ model: tryModel, reason: `${attempt+1}回連続短期レート制限`, recoverable: 'wait' });
          let errMsg = `❌ 抽出失敗（全モデル試行済）\n\n【試行履歴】\n`;
          errMsg += failureLog.map(f => `  ・${f.model}: ${f.reason}`).join('\n');
          errMsg += `\n\n💡 対処:\n・1〜2分待ってから再試行（短期制限は1分で回復）\n・Google AI Studio ダッシュボードで RPD/TPM/RPM の使用率を確認\n・別プロジェクトのキーを追加して負荷分散\n・3パス精度パイプライン (核心+補完+Critic) は1論文=3コール → 5論文/日が上限`;
          throw new Error(errMsg);
        }
      }

      if (r.kind === 'overloaded') {
        consecutiveOverload++;
        // 同モデルで 2 回連続 503 → フォールバックモデルへ
        if (consecutiveOverload >= 2 && !isLastModel) break;
        // 最終モデルでも 503 が続けば諦める
        if (consecutiveOverload >= 3 && isLastModel) {
          throw new Error(`全モデル (${modelChain.join(' / ')}) が過負荷。数分後に再試行してください。`);
        }
      } else {
        consecutiveOverload = 0;
      }

      // 待機してリトライ（待機時間を厳しく上限化：体感「動かない」感を排除）
      let waitMs = backoffMs(attempt, r.kind, r.retryAfterSec);
      // 短期バースト時は Google 指示秒を尊重（最大40秒まで）
      // それ以外の上限決定方針:
      //   - ユーザー選択モデル(mIdx=0)はちゃんと粘る → 上限長め(15-25s)
      //   - フォールバック先(mIdx>0)は素早く回す → 上限短め(5-8s)
      //   - 最終モデルは最後の砦なので長め
      let waitCap;
      if (isShortBurst) {
        // Google が短期バーストとして 35 秒程度の待機を指示してきている → 指示通り待つ
        waitCap = Math.min((r.retryAfterSec + 3) * 1000, 40000);
      } else {
        waitCap = r.kind === 'ratelimit'
          ? (isLastModel ? 25000 : (isUserSelected ? 15000 : 5000))
          : (isLastModel ? 12000 : (isUserSelected ? 8000 : 6000));
      }
      waitMs = Math.min(waitMs, waitCap);
      // 表示: フォールバック中なら「選択 → 試行中」を明示
      const modelLabel = mIdx > 0 ? `${model}失敗 → ${tryModel}にフォールバック中` : tryModel;
      const kindLabel = r.kind === 'overloaded' ? '🔁 503 過負荷'
        : r.kind === 'ratelimit'
          ? (isShortBurst ? '⏰ 短期バースト制限'
            : `⏳ レート制限${isTpmQuota ? '(TPM分次)' : isRpmQuota ? '(RPM分次)' : isDailyQuota ? '(RPD日次)' : ''}`)
        : '🔁 再試行';
      // 短期バースト時はサーバー指示秒尊重を明示
      const retryHint = r.retryAfterSec > 0
        ? (isShortBurst ? ` (Google指示${r.retryAfterSec}秒尊重)` : ` (Google指示${r.retryAfterSec}秒→${Math.round(waitMs/1000)}秒に短縮)`)
        : '';
      notice(`${kindLabel} (${modelLabel})${retryHint} → ${Math.round(waitMs/1000)}秒待機 [${attempt+1}/${maxAttempts}]`);
      await sleep(waitMs);
    }
  }

  // 全モデル試行後の失敗 → ヒント付きエラー（failureLog で各モデルの状況を明示）
  let hint = '';
  if (failureLog.length > 0) {
    hint += `\n\n【各モデルの試行結果】\n` + failureLog.map(f => `  ・${f.model}: ${f.reason}`).join('\n');
  }
  hint += `\n\n💡 ヒント:\n・選択した複数モデルが全て失敗 → ダッシュボードで RPD/RPM/TPM を確認\n・別Googleプロジェクトで2個目のAPIキー作成 → 複数キー登録で枠が掛け算で拡張\n・Google Cloud Billing 有効化で Pay-as-you-go に切替（無料枠の厳しい上限が大幅緩和）`;
  throw (lastErr ? new Error(lastErr.message + hint) : new Error("Gemini呼び出しに失敗" + hint));
}

  });
}

const clipCopy = (text) => {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text); return true;

  const ta = document.createElement("textarea"); ta.value = text;
  ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  let ok = false; try { ok = document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta); return ok;
};

   ============================================================ */
function PdfPage({ pdf, pageNum, scale, selectionMode, onAreaSelect, extracting }) {
  const canvasRef = useRef(null); const textRef = useRef(null); const [w, setW] = useState('auto');
  const overlayRef = useRef(null);
  // 範囲選択の描画状態
  const [draw, setDraw] = useState(null); // {sx,sy,x,y,w,h,active}
  // Shift キーで一時的に範囲選択モード化
  const [shiftHeld, setShiftHeld] = useState(false);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Shift') setShiftHeld(e.type === 'keydown'); };
    window.addEventListener('keydown', onKey);
    window.addEventListener('keyup', onKey);
    // フォーカスが外れたときも解除
    const onBlur = () => setShiftHeld(false);
    window.addEventListener('blur', onBlur);
    return () => {
      window.removeEventListener('keydown', onKey);
      window.removeEventListener('keyup', onKey);
      window.removeEventListener('blur', onBlur);
    };
  }, []);

  // 実効モード: モード設定 が area か、または Shift 押下中 → area 扱い
  const effectiveAreaMode = selectionMode === 'area' || shiftHeld;

  useEffect(() => {
    let task;
    const render = async () => {
      try {
        const page = await pdf.getPage(pageNum);
        const vp = page.getViewport({ scale });
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d'); canvas.height = vp.height; canvas.width = vp.width; setW(`${vp.width}px`);
        task = page.render({ canvasContext: ctx, viewport: vp });
        await task.promise;
        const tc = await page.getTextContent();
        const tl = textRef.current; if (!tl) return;
        tl.innerHTML = ''; tl.style.width = `${vp.width}px`; tl.style.height = `${vp.height}px`; tl.style.setProperty('--scale-factor', scale);
        pdfjsLib.renderTextLayer({ textContentSource: tc, container: tl, viewport: vp, textDivs: [] });
      } catch (e) { if (e.name !== 'RenderingCancelledException') console.warn(e); }
    }; render(); return () => { if (task) try { task.cancel(); } catch (e) {} };
  }, [pdf, pageNum, scale]);

  // 範囲選択ハンドラ
  const onMouseDown = (e) => {
    if (!effectiveAreaMode) return;
    e.preventDefault();
    const r = overlayRef.current.getBoundingClientRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    setDraw({ sx, sy, x: sx, y: sy, w: 0, h: 0, active: true });
  };
  const onMouseMove = (e) => {
    if (!draw?.active) return;
    const r = overlayRef.current.getBoundingClientRect();
    const cx = e.clientX - r.left, cy = e.clientY - r.top;
    setDraw(d => ({ ...d, x: Math.min(d.sx, cx), y: Math.min(d.sy, cy), w: Math.abs(cx - d.sx), h: Math.abs(cy - d.sy) }));
  };
  const onMouseUp = () => {
    if (!draw?.active) return;
    if (draw.w < 15 || draw.h < 15) { setDraw(null); return; }
    setDraw(d => ({ ...d, active: false }));
  };

  const confirmArea = () => {
    if (!draw || !canvasRef.current) return;
    // キャンバスから選択範囲を切り出して画像化（解像度2倍に拡大して文字認識精度を上げる）
    const cv = canvasRef.current;
    const tmp = document.createElement('canvas');
    const upscale = 2;
    tmp.width = Math.round(draw.w * upscale);
    tmp.height = Math.round(draw.h * upscale);
    const ctx = tmp.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(cv, draw.x, draw.y, draw.w, draw.h, 0, 0, tmp.width, tmp.height);
    const imgData = tmp.toDataURL('image/jpeg', 0.95).split(',')[1];
    onAreaSelect && onAreaSelect({ pageNum, image: imgData });
    setDraw(null);
  };

  const cancelArea = () => setDraw(null);

  return (
    <div id={`pdf-page-${pageNum}`} className="bg-white shadow-lg relative rounded overflow-hidden flex-shrink-0 mx-auto mb-4" style={{width:w}}>
      <canvas ref={canvasRef} className="block"/>
      <div ref={textRef} className="textLayer" style={{pointerEvents: effectiveAreaMode ? 'none' : 'auto', userSelect: effectiveAreaMode ? 'none' : 'text'}}/>
      {/* 範囲選択オーバーレイ */}
      <div ref={overlayRef}
           className={`absolute inset-0 z-30 ${effectiveAreaMode ? 'cursor-crosshair' : ''}`}
           style={{pointerEvents: effectiveAreaMode ? 'auto' : 'none'}}
           onMouseDown={onMouseDown}
           onMouseMove={onMouseMove}
           onMouseUp={onMouseUp}
           onMouseLeave={onMouseUp}/>
      {/* Shift 押下中のヒント表示（テキスト選択モード時） */}
      {shiftHeld && selectionMode === 'text' && (
        <div className="absolute top-2 right-2 z-40 bg-purple-600 text-white text-[10px] font-bold px-2 py-1 rounded-full shadow-lg pointer-events-none flex items-center gap-1 animate-pulse">
          <TargetIcon size={10}/>範囲選択モード (Shift)
        </div>
      )}
      {/* 描画中の矩形 */}
      {draw && (
        <div className="absolute z-40 pointer-events-none"
             style={{left:draw.x,top:draw.y,width:draw.w,height:draw.h,border:'2px solid #dc2626',background:'rgba(220,38,38,0.12)',boxShadow:'0 0 0 9999px rgba(0,0,0,0.25)'}}>
          {!draw.active && (
            <div className="absolute pointer-events-auto flex gap-1" style={{top:'100%',right:0,marginTop:6}}>
              <button onClick={confirmArea} disabled={extracting}
                      className="bg-purple-600 hover:bg-purple-700 disabled:bg-slate-400 text-white text-[12px] font-bold px-3 py-2 rounded-lg shadow-xl flex items-center gap-1.5 whitespace-nowrap ring-2 ring-purple-300">
                {extracting ? <><span className="animate-spin h-3 w-3 border-2 border-white border-t-transparent rounded-full"/>抽出中...</> : <><Sparkles size={12}/>この範囲から抽出</>}
              </button>
              <button onClick={cancelArea} title="キャンセル" className="bg-slate-700 hover:bg-slate-800 text-white text-[12px] px-2.5 py-2 rounded-lg shadow"><XCircle size={13}/></button>
            </div>
          )}
        </div>
      )}
      <div className="absolute top-1.5 left-1.5 bg-black/60 text-white text-[9px] font-mono px-1.5 py-0.5 rounded-full z-20">P.{pageNum}</div>
    </div>
  );
}

function PdfViewer({ file, searchQuery, targetPage, onToast, scale, selectionMode, onExtractFromSelection, extracting }) {
  const [pdf, setPdf] = useState(null); const [numPages, setNumPages] = useState(0);
  // テキスト選択時のフローティングボタン
  const [textSel, setTextSel] = useState(null); // {text, pageNum, x, y}

  useEffect(() => {
    if (!file) return; let d = false;
    file.arrayBuffer().then(buf => {
      if (d) return;
      pdfjsLib.getDocument({ data: buf }).promise.then(doc => {
        if (d) return; setPdf(doc); setNumPages(doc.numPages);
      }).catch(() => onToast("PDF読込失敗", "error"));
    });
    return () => { d = true; };
  }, [file]);
  useEffect(() => {
    if (!targetPage) return;
    const el = document.getElementById(`pdf-page-${targetPage}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, [targetPage]);
  useEffect(() => {
    if (!searchQuery) return;
    const timer = setTimeout(() => {
      document.querySelectorAll('.highlight-hook').forEach(el => el.classList.remove('highlight-hook'));
      const clean = searchQuery.replace(/[\n\r\t]/g, ' ').replace(/\s+/g, ' ').trim();
      if (!clean) return;
      const normQ = clean.toLowerCase().replace(/\s+/g, '');
      if (!normQ) return;
      let first = null; let matchCount = 0;
      document.querySelectorAll('.textLayer span').forEach(span => {
        const t = span.textContent; if (!t.trim()) return;
        const normS = t.toLowerCase().replace(/\s+/g, '');
        if (!normS) return;
        if (normS.includes(normQ) || (normS.length >= 3 && normQ.includes(normS))) {
          span.classList.add('highlight-hook'); matchCount++;
          if (!first) first = span;
        }
      });
      if (first) { first.scrollIntoView({ behavior: 'smooth', block: 'center' }); onToast(`該当箇所（${matchCount}部分）をハイライト`); }
      else onToast("テキスト未発見。別のキーワードをお試しください", "error");
    }, 700);
    return () => clearTimeout(timer);
  }, [searchQuery, scale]);

  // テキスト選択リスナー（モード = 'text' のときのみ動作。既存の選択動作は壊さず、ボタンだけ追加表示）
  useEffect(() => {
    if (selectionMode !== 'text') { setTextSel(null); return; }
    let timer;
    const handler = () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed) { setTextSel(null); return; }
        const text = sel.toString().trim();
        if (text.length < 10) { setTextSel(null); return; }
        const range = sel.getRangeAt(0);
        const node = range.commonAncestorContainer;
        const tlEl = (node.nodeType === 1 ? node : node.parentElement)?.closest?.('.textLayer');
        if (!tlEl) { setTextSel(null); return; }
        const pageEl = tlEl.closest('[id^="pdf-page-"]');
        const pageNum = pageEl ? parseInt(pageEl.id.replace('pdf-page-', '')) : null;
        const rect = range.getBoundingClientRect();
        setTextSel({ text, pageNum, x: rect.left + rect.width / 2, y: rect.bottom });
      }, 250);
    };
    document.addEventListener('selectionchange', handler);
    return () => { document.removeEventListener('selectionchange', handler); clearTimeout(timer); };
  }, [selectionMode]);

  const handleAreaSelect = ({ pageNum, image }) => {
    onExtractFromSelection && onExtractFromSelection({ type: 'image', image, pageNum });
  };
  const handleTextExtract = () => {
    if (!textSel) return;
    onExtractFromSelection && onExtractFromSelection({ type: 'text', text: textSel.text, pageNum: textSel.pageNum });
    setTextSel(null);
    try { window.getSelection().removeAllRanges(); } catch (e) {}
  };

  if (!pdf) return <div className="flex h-full items-center justify-center text-slate-400"><span className="animate-spin h-5 w-5 border-2 border-slate-300 border-t-blue-500 rounded-full mr-2"/>PDF読込中...</div>;
  return (
    <>
      <div className="absolute top-0 left-0 min-w-full p-3 flex flex-col items-center pb-20">
        {Array.from({ length: numPages }, (_, i) => (
          <PdfPage key={i+1} pdf={pdf} pageNum={i+1} scale={scale}
                   selectionMode={selectionMode}
                   onAreaSelect={handleAreaSelect}
                   extracting={extracting}/>
        ))}
      </div>
      {/* テキスト選択時のフローティング抽出ボタン */}
      {selectionMode === 'text' && textSel && (
        <div className="fixed z-50 flex gap-1 fade-in-up"
             style={{ left: Math.max(8, Math.min(textSel.x - 90, window.innerWidth - 200)), top: textSel.y + 8 }}>
          <button onClick={handleTextExtract} disabled={extracting}
                  className="bg-purple-600 hover:bg-purple-700 disabled:bg-slate-400 text-white text-xs font-bold px-3 py-2 rounded-lg shadow-xl flex items-center gap-1.5 ring-2 ring-purple-300">
            {extracting ? <><span className="animate-spin h-3 w-3 border-2 border-white border-t-transparent rounded-full"/>抽出中</> : <><Sparkles size={12}/>選択箇所を抽出</>}
          </button>
          <button onClick={() => { setTextSel(null); try { window.getSelection().removeAllRanges(); } catch (e) {} }}
                  className="bg-slate-700 hover:bg-slate-800 text-white text-xs px-2 py-2 rounded-lg shadow-xl"><XCircle size={12}/></button>
        </div>
      )}
    </>
  );
}

async function extractPdfText(file) {
  const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  let t = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const p = await pdf.getPage(i);
    const c = await p.getTextContent();
    t += `\n--- Page ${i} ---\n` + c.items.map(x => x.str).join(' ');
  }
  return t;
}

async function extractPdfImages(file, onProgress, scale = 3.0) {
  const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  const parts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    if (onProgress) onProgress(`高解像度レンダリング (${i}/${pdf.numPages})`);
    const p = await pdf.getPage(i);
    const vp = p.getViewport({ scale });
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    c.height = vp.height; c.width = vp.width;
    await p.render({ canvasContext: ctx, viewport: vp }).promise;
    parts.push({ inlineData: { data: c.toDataURL('image/jpeg', 0.95).split(',')[1], mimeType: "image/jpeg" } });
    c.width = 0; c.height = 0;
  }
  return parts;
}

async function getPdfBase64(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = '';
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk) binary += String.fromCharCode.apply(null, bytes.slice(i, i + chunk));
  return btoa(binary);
}

/* ------------------------------------------------------------
   メタ分析ソフト連携用エクスポート（純粋関数 — read-only / 副作用なし）
   - RevMan Web 用 TSV（二値 / 連続）
   - R metafor 用スクリプト（二値 / 連続）
   抽出失敗箇所は必ず空白。推測値・代用値は入れない。
   ------------------------------------------------------------ */

// 文字列から先頭の数値だけを抽出。失敗 / "不明" / "-" / "未抽出" / 空 → 空文字
function extractNumber(s) {
  if (s === null || s === undefined) return '';
  const t = String(s).trim();
  if (t === '' || t === '-' || t === '不明' || t === '未抽出' || t === 'NA' || t === 'N/A') return '';
  const m = t.match(/^-?\d+(?:\.\d+)?/);
  return m ? m[0] : '';
}

// 95%CI 文字列をパース。"0.23-0.63" / "0.23 to 0.63" / "(0.23, 0.63)" / "0.23–0.63" / "-1.0 to -0.6" 等に対応
// 負の値の先頭マイナスを誤って区切りにしないよう、ハイフンは「直前が数字」の場合のみ区切りとして扱う
function parseCI(ci95) {
  if (!ci95) return { lower: '', upper: '' };
  const t = String(ci95).replace(/[()\[\]]/g, '').trim();
  // 区切り: "to" / カンマ / en/em-dash 類 / 数字直後のハイフン
  const parts = t.split(/\s*(?:to|,|–|—|‐|−)\s*|(?<=\d)\s*-\s*/i).map(s => s.trim()).filter(Boolean);
  if (parts.length < 2) return { lower: '', upper: '' };
  const lo = extractNumber(parts[0]);
  const hi = extractNumber(parts[1]);
  return { lower: lo, upper: hi };
}

// 連続量の metric を actualOutcomeName / notes / calculationMethod から推定
function inferMetric(o) {
  const text = [(o.actualOutcomeName||''), (o.notes||''), (o.calculationMethod||'')].join(' ').toLowerCase();
  if (/ancova|adjusted|ls\s*mean|調整|adjusted\s*md/i.test(text)) return 'adjusted-difference';
  if (/変化量|change[\s-]*from[\s-]*baseline|change[\s-]*score|post[\s-]*pre|pre[\s-]*post|δ|delta|\bchange\b/i.test(text)) return 'change-from-baseline';
  if (/術前|baseline|pre[\s-]*op|preoperative|pre[\s-]*treatment|pre[\s-]*intervention/i.test(text)) return 'baseline-value';
  return 'post-value';
}

// PDFファイル名から study ID を生成（拡張子と特殊文字を除去、空白→アンダースコア）
function deriveStudyId(filename) {
  if (!filename) return 'Study_1';
  return String(filename)
    .replace(/\.[^.]+$/, '')
    .replace(/[^A-Za-z0-9_\-぀-ヿ一-鿿]+/g, '_')
    .replace(/^_+|_+$/g, '')
    .substring(0, 60) || 'Study_1';
}

// CSV/TSV セルのエスケープ（区切り・改行・クォート対応）
function csvEscape(v, delimiter) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  if (s === '') return '';
  if (s.includes(delimiter) || s.includes('"') || s.includes('\n') || s.includes('\r')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function buildDelimitedTable(headers, rows, delimiter) {
  const lines = [headers.map(h => csvEscape(h, delimiter)).join(delimiter)];
  rows.forEach(r => lines.push(r.map(c => csvEscape(c, delimiter)).join(delimiter)));
  return lines.join('\n');
}

// reported_RR / reported_OR / reported_HR / reported_RD のうち measureType に対応する列にのみ値を入れる
function buildBinaryEffectColumns(eff) {
  const out = { reported_RR: '', reported_OR: '', reported_HR: '', reported_RD: '' };
  if (!eff) return out;
  const mt = String(eff.measureType||'').toUpperCase();
  const v = extractNumber(eff.value);
  if (!v) return out;
  if (mt === 'RR') out.reported_RR = v;
  else if (mt === 'OR') out.reported_OR = v;
  else if (mt === 'HR') out.reported_HR = v;
  else if (mt === 'RD' || mt === 'ARR' || mt === 'NNT') out.reported_RD = v;
  return out;
}

// log(HR) と SE_log_HR を計算（HRが取れる時のみ）
function computeLogHR(eff) {
  const out = { log_HR: '', SE_log_HR: '' };
  if (!eff) return out;
  const mt = String(eff.measureType||'').toUpperCase();
  if (mt !== 'HR') return out;
  const hr = parseFloat(extractNumber(eff.value));
  if (!isFinite(hr) || hr <= 0) return out;
  const { lower, upper } = parseCI(eff.ci95);
  const lo = parseFloat(lower), up = parseFloat(upper);
  out.log_HR = Math.log(hr).toFixed(4);
  if (isFinite(lo) && isFinite(up) && lo > 0 && up > 0 && up > lo) {
    out.SE_log_HR = ((Math.log(up) - Math.log(lo)) / 3.92).toFixed(4);
  }
  return out;
}

// 連続量で reported_MD / reported_SMD / reported_AdjMD のうち対応列にのみ値を入れる
function buildContinuousEffectColumns(eff, metric) {
  const out = { reported_MD: '', reported_SMD: '', reported_AdjMD: '' };
  if (!eff) return out;
  const mt = String(eff.measureType||'').toUpperCase();
  const v = extractNumber(eff.value);
  if (!v) return out;
  if (metric === 'adjusted-difference') out.reported_AdjMD = v;
  else if (mt === 'SMD') out.reported_SMD = v;
  else if (mt === 'MD' || mt === '') out.reported_MD = v;
  return out;
}

// 95%CIから SE を計算: (upper - lower) / 3.92
function computeSEFromCI(eff) {
  if (!eff) return '';
  const { lower, upper } = parseCI(eff.ci95);
  const lo = parseFloat(lower), up = parseFloat(upper);
  if (!isFinite(lo) || !isFinite(up) || up <= lo) return '';
  return ((up - lo) / 3.92).toFixed(4);
}

// SD/SE 判定: sdOrSe フィールドが "SE" 系なら値は SE 列に入れて SD は空白、それ以外は SD 列に入れる
function splitSdOrSe(group, sdOrSeLabel) {
  const raw = extractNumber(group?.sd_or_se);
  const isSE = /SE|SEM|standard\s*error/i.test(String(sdOrSeLabel||'')) || /SE|SEM/i.test(String(group?.sd_or_se||''));
  if (!raw) return { sd: '', se: '' };
  return isSE ? { sd: '', se: raw } : { sd: raw, se: '' };
}

// アウトカムタイプの判定（variableType 優先、不明時は effectEstimate.measureType でフォールバック）
function isBinaryOutcome(o) {
  const vt = String(o.variableType||'').toLowerCase();
  if (vt.includes('binary') || vt.includes('time')) return true; // TimeToEvent も二値テーブルに含める（HR共通のため）
  if (vt.includes('continuous')) return false;
  // フォールバック: measureType
  const mt = String(o.effectEstimate?.measureType||'').toUpperCase();
  if (['RR','OR','HR','RD','ARR','NNT'].includes(mt)) return true;
  if (['MD','SMD'].includes(mt)) return false;
  // 最終フォールバック: events/mean に "/" や "%" があれば二値
  const ev = String(o.interventionGroup?.events_or_mean||'') + ' ' + String(o.comparisonGroup?.events_or_mean||'');
  if (/\/|%/.test(ev)) return true;
  return false;
}

// === RevMan用 二値アウトカム TSV ===
const REVMAN_BINARY_HDRS = [
  'outcome', 'study', 'timepoint', 'population',
  'events_intervention', 'total_intervention', 'events_control', 'total_control',
  'reported_RR', 'reported_OR', 'reported_HR', 'reported_RD',
  'ci95_lower', 'ci95_upper', 'log_HR', 'SE_log_HR', 'p_value',
  'sourceLocation', 'pageNumber', 'confidence', 'notes'
];

function buildRevManBinaryRows(outcomes, studyId) {
  return outcomes.filter(isBinaryOutcome).map(o => {
    const eff = o.effectEstimate || {};
    const effCols = buildBinaryEffectColumns(eff);
    const ci = parseCI(eff.ci95);
    const log = computeLogHR(eff);
    return [
      o.actualOutcomeName || '',
      studyId,
      o.timePoint || '',
      o.populationType || '',
      extractNumber(o.interventionGroup?.events_or_mean),
      extractNumber(o.interventionGroup?.n_total),
      extractNumber(o.comparisonGroup?.events_or_mean),
      extractNumber(o.comparisonGroup?.n_total),
      effCols.reported_RR, effCols.reported_OR, effCols.reported_HR, effCols.reported_RD,
      ci.lower, ci.upper, log.log_HR, log.SE_log_HR,
      (eff.pValue && !['-','不明','未抽出','NA','N/A'].includes(String(eff.pValue).trim())) ? eff.pValue : '',
      o.sourceLocation || '',
      o.pageNumber || '',
      o.confidence || '',
      (o.notes || '').replace(/[\n\t]/g, ' ')
    ];
  });
}

function toRevManBinaryTSV(outcomes, studyId) {
  const rows = buildRevManBinaryRows(outcomes, studyId);
  return { tsv: buildDelimitedTable(REVMAN_BINARY_HDRS, rows, '\t'), count: rows.length };
}

// === RevMan用 連続アウトカム TSV ===
const REVMAN_CONT_HDRS = [
  'outcome', 'study', 'timepoint', 'population', 'metric', 'scaleInfo',
  'n_intervention', 'mean_intervention', 'sd_intervention', 'se_intervention',
  'n_control', 'mean_control', 'sd_control', 'se_control',
  'reported_MD', 'reported_SMD', 'reported_AdjMD',
  'ci95_lower', 'ci95_upper', 'SE_from_CI', 'p_value',
  'sd_or_se_label', 'sourceLocation', 'pageNumber', 'confidence', 'notes'
];

function buildRevManContinuousRows(outcomes, studyId) {
  return outcomes.filter(o => !isBinaryOutcome(o)).map(o => {
    const eff = o.effectEstimate || {};
    const metric = inferMetric(o);
    const effCols = buildContinuousEffectColumns(eff, metric);
    const ci = parseCI(eff.ci95);
    const sdSeLabel = o.sdOrSe || '';
    const intSdSe = splitSdOrSe(o.interventionGroup, sdSeLabel);
    const ctlSdSe = splitSdOrSe(o.comparisonGroup, sdSeLabel);
    return [
      o.actualOutcomeName || '',
      studyId,
      o.timePoint || '',
      o.populationType || '',
      metric,
      '', // scaleInfo: 抽出フィールドに存在しないため空白（notes に記載あれば手動転記）
      extractNumber(o.interventionGroup?.n_total),
      extractNumber(o.interventionGroup?.events_or_mean),
      intSdSe.sd, intSdSe.se,
      extractNumber(o.comparisonGroup?.n_total),
      extractNumber(o.comparisonGroup?.events_or_mean),
      ctlSdSe.sd, ctlSdSe.se,
      effCols.reported_MD, effCols.reported_SMD, effCols.reported_AdjMD,
      ci.lower, ci.upper, computeSEFromCI(eff),
      (eff.pValue && !['-','不明','未抽出','NA','N/A'].includes(String(eff.pValue).trim())) ? eff.pValue : '',
      sdSeLabel,
      o.sourceLocation || '',
      o.pageNumber || '',
      o.confidence || '',
      (o.notes || '').replace(/[\n\t]/g, ' ')
    ];
  });
}

function toRevManContinuousTSV(outcomes, studyId) {
  const rows = buildRevManContinuousRows(outcomes, studyId);
  return { tsv: buildDelimitedTable(REVMAN_CONT_HDRS, rows, '\t'), count: rows.length };
}

// === R metafor 用ベクトル文字列ビルダー ===
// 数値列: 空文字は NA、それ以外は数値リテラルとしてそのまま
function rNumVec(values) {
  const inner = values.map(v => (v === '' || v === null || v === undefined) ? 'NA' : String(v)).join(', ');
  return `c(${inner})`;
}
// 文字列列: 空文字も NA_character_ にする（R での欠損扱い統一のため）
function rStrVec(values) {
  const inner = values.map(v => (v === '' || v === null || v === undefined) ? 'NA_character_' : ('"' + String(v).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, ' ') + '"')).join(', ');
  return `c(${inner})`;
}

function buildRDataFrameBlock(varName, headers, rows, numericCols) {
  if (rows.length === 0) {
    return `${varName} <- data.frame()  # 該当アウトカム0件\n`;
  }
  const colData = headers.map((h, i) => rows.map(r => r[i]));
  const lines = headers.map((h, i) => {
    const isNum = numericCols.has(h);
    const vec = isNum ? rNumVec(colData[i]) : rStrVec(colData[i]);
    const pad = ' '.repeat(Math.max(0, 20 - h.length));
    return `  ${h}${pad}= ${vec}`;
  });
  return `${varName} <- data.frame(\n${lines.join(',\n')},\n  stringsAsFactors  = FALSE\n)\n`;
}

const R_BINARY_NUM_COLS = new Set([
  'events_intervention', 'total_intervention', 'events_control', 'total_control',
  'reported_RR', 'reported_OR', 'reported_HR', 'reported_RD',
  'ci95_lower', 'ci95_upper', 'log_HR', 'SE_log_HR', 'pageNumber'
]);

function toRMetaforBinaryScript(outcomes, studyId) {
  const rows = buildRevManBinaryRows(outcomes, studyId);
  const ts = new Date().toISOString().replace('T', ' ').substring(0, 19);
  const header = `# DataEx 自動生成 — メタ分析用 R スクリプト (二値アウトカム / Time-to-event)\n# 生成日時: ${ts}\n# 研究: ${studyId}\n# 該当アウトカム: ${rows.length}件\n\nlibrary(metafor)\n\n`;
  const df = buildRDataFrameBlock('dat_binary', REVMAN_BINARY_HDRS, rows, R_BINARY_NUM_COLS);
  const usage = `\n# 効果量計算の例:\n# # OR メタ分析:\n# escalc(measure="OR", ai=events_intervention, n1i=total_intervention,\n#                       ci=events_control,      n2i=total_control, data=dat_binary)\n#\n# # RR メタ分析:\n# escalc(measure="RR", ai=events_intervention, n1i=total_intervention,\n#                       ci=events_control,      n2i=total_control, data=dat_binary)\n#\n# # HR の generic inverse variance（log_HR と SE_log_HR が取れている行のみ）:\n# rma(yi=log_HR, sei=SE_log_HR, data=subset(dat_binary, !is.na(log_HR) & !is.na(SE_log_HR)))\n`;
  return { script: header + df + usage, count: rows.length };
}

const R_CONT_NUM_COLS = new Set([
  'n_intervention', 'mean_intervention', 'sd_intervention', 'se_intervention',
  'n_control', 'mean_control', 'sd_control', 'se_control',
  'reported_MD', 'reported_SMD', 'reported_AdjMD',
  'ci95_lower', 'ci95_upper', 'SE_from_CI', 'pageNumber'
]);

function toRMetaforContinuousScript(outcomes, studyId) {
  const rows = buildRevManContinuousRows(outcomes, studyId);
  const ts = new Date().toISOString().replace('T', ' ').substring(0, 19);
  const header = `# DataEx 自動生成 — メタ分析用 R スクリプト (連続アウトカム)\n# 生成日時: ${ts}\n# 研究: ${studyId}\n# 該当アウトカム: ${rows.length}件\n# metric 列で post-value / change-from-baseline / adjusted-difference / baseline-value を識別\n\nlibrary(metafor)\n\n`;
  const df = buildRDataFrameBlock('dat_continuous', REVMAN_CONT_HDRS, rows, R_CONT_NUM_COLS);
  const usage = `\n# 解析の例 (metric でフィルタして使用):\n# # 術後値で MD メタ分析:\n# dat_post <- subset(dat_continuous, metric == "post-value")\n# escalc(measure="MD", m1i=mean_intervention, sd1i=sd_intervention, n1i=n_intervention,\n#                       m2i=mean_control,      sd2i=sd_control,      n2i=n_control, data=dat_post)\n#\n# # 変化量で MD メタ分析:\n# dat_change <- subset(dat_continuous, metric == "change-from-baseline")\n# escalc(measure="MD", m1i=mean_intervention, sd1i=sd_intervention, n1i=n_intervention,\n#                       m2i=mean_control,      sd2i=sd_control,      n2i=n_control, data=dat_change)\n#\n# # ANCOVA 調整済み MD は generic inverse variance:\n# dat_adj <- subset(dat_continuous, metric == "adjusted-difference")\n# rma(yi=reported_AdjMD, sei=SE_from_CI, data=subset(dat_adj, !is.na(reported_AdjMD) & !is.na(SE_from_CI)))\n#\n# # SE のみ報告されている行は SD = SE * sqrt(n) で変換してから escalc に投入:\n# # 例: dat$sd_intervention <- ifelse(is.na(dat$sd_intervention) & !is.na(dat$se_intervention),\n# #                                    dat$se_intervention * sqrt(dat$n_intervention), dat$sd_intervention)\n`;
  return { script: header + df + usage, count: rows.length };
}

// Merge two extraction results intelligently
function mergeResults(primary, secondary) {
  if (!secondary) return primary;
  if (!primary) return secondary;
  const result = JSON.parse(JSON.stringify(primary));

  // Merge outcomes
  if (secondary.extractedOutcomes) {
    if (!result.extractedOutcomes) result.extractedOutcomes = [];
    const pk = new Set(result.extractedOutcomes.map(o => `${o.actualOutcomeName}|${o.timePoint}|${o.variableType}|${o.populationType}|${o.sourceLocation}`));
    secondary.extractedOutcomes.forEach(o => {
      const key = `${o.actualOutcomeName}|${o.timePoint}|${o.variableType}|${o.populationType}|${o.sourceLocation}`;
      if (!pk.has(key)) {
        o.notes = (o.notes || '') + ' [補完抽出]';
        result.extractedOutcomes.push(o);
        pk.add(key);
      }
    });
  }

  // Merge baseline
  if (secondary.baselineCharacteristics) {
    if (!result.baselineCharacteristics) result.baselineCharacteristics = secondary.baselineCharacteristics;
    else {
      const bk = new Set(result.baselineCharacteristics.map(b => b.variable));
      secondary.baselineCharacteristics.forEach(b => {
        if (!bk.has(b.variable)) { result.baselineCharacteristics.push(b); bk.add(b.variable); }
      });
    }
  }

  // Merge arrays
  ['unclearItems', 'statisticalMethods'].forEach(k => {
    if (secondary[k]) {
      const s = new Set(result[k] || []);
      secondary[k].forEach(v => { if (!s.has(v)) (result[k] || (result[k] = [])).push(v); });
    }
  });

  // Prefer longer/more detailed commentary
  if (secondary.expertCommentary && (!result.expertCommentary || secondary.expertCommentary.length > result.expertCommentary.length * 1.5)) {
    result.expertCommentary = (result.expertCommentary ? result.expertCommentary + '\n\n【補足】\n' : '') + secondary.expertCommentary;
  }

  // CONSORT flow
  if (secondary.consortFlow && !result.consortFlow) result.consortFlow = secondary.consortFlow;

  // Paper quality
  if (secondary.paperQualityAssessment && !result.paperQualityAssessment) result.paperQualityAssessment = secondary.paperQualityAssessment;

  return result;
}

// Apply critic corrections to extracted data
function applyCorrections(extracted, criticReview) {
  if (!criticReview?.corrections) return extracted;
  const result = JSON.parse(JSON.stringify(extracted));

  criticReview.corrections.forEach(c => {
    const target = c.targetType === 'outcome' ? result.extractedOutcomes?.[c.targetIndex]
                 : c.targetType === 'baseline' ? result.baselineCharacteristics?.[c.targetIndex]
                 : null;
    if (!target) return;

    // Append critic note
    if (c.severity === 'critical' || c.severity === 'warning') {
      target.notes = (target.notes || '') + ` [Critic修正/${c.severity}: ${c.issue}]`;
      if (c.proposedFix && c.severity === 'critical') {
        // Try to apply proposed fix if clearly scoped
        const parts = c.field?.split('.');
        if (parts?.length === 2 && target[parts[0]] && typeof target[parts[0]] === 'object') {
          target[parts[0]][parts[1]] = c.proposedFix;
        } else if (c.field && target[c.field] !== undefined && typeof target[c.field] !== 'object') {
          target[c.field] = c.proposedFix;
        }
      }
    }
    target.confidence = target.confidence === 'high' ? 'medium' : target.confidence || 'medium';
  });

  if (criticReview.missingOutcomes?.length) {
    result.unclearItems = (result.unclearItems || []).concat(
      criticReview.missingOutcomes.map(m => `[Criticが欠落指摘] ${m}`)
    );
  }

  result._criticAssessment = criticReview.overallAssessment;
  result._criticConfidence = criticReview.confidenceScore;

  return result;
}

  if (!confidence) return null;

  const cls = colors[confidence] || colors.medium;
  return <span className={`text-[8px] font-bold px-1 py-0.5 rounded border ${cls}`} title={`信頼度: ${confidence}`}>信{labels[confidence] || '?'}</span>;
}

function renderBold(text) {
  if (!text) return null;
  const parts = String(text).split(/\*\*(.+?)\*\*/g);
  return parts.map((p, i) => i % 2 === 1 ? React.createElement('b', { key: i }, p) : p);
}

function GeminiKeyCard({ apiKeys, onChange, model, onModelChange, onVerify, verifyState }) {
  const [showKeys, setShowKeys] = useState(false);
  const updateKey = (idx, value) => {
    const next = apiKeys.slice();
    next[idx] = value;
    onChange(next);
  };
  const addKey = () => onChange([...apiKeys, ""]);
  const removeKey = (idx) => onChange(apiKeys.length > 1 ? apiKeys.filter((_, i) => i !== idx) : [""]);
  const validKeys = apiKeys.filter(k => k && k.trim()).length;

  return (
    <div className={`bg-white rounded-xl border-2 transition-all shadow-sm overflow-hidden ${validKeys > 0 ? 'border-purple-300 shadow-md' : 'border-slate-200'}`}>
      <div className="bg-gradient-to-r from-blue-500 to-cyan-500 text-white px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <Sparkles size={20}/>
          <div>
            <h3 className="font-bold text-base">Google AI Studio (Gemini)</h3>
            <p className="text-[10px] opacity-90">無料枠で利用可能。APIキー1個でOK・複数登録で枠を実質拡張</p>
          </div>
        </div>
        {validKeys > 0 && <span className="bg-white/20 text-[10px] font-bold px-2 py-1 rounded">{validKeys}個 設定済</span>}
      </div>
      <div className="p-4 space-y-3">
        <div>
          <div className="flex items-center justify-between mb-1.5">
            <label className="text-[11px] font-semibold text-slate-700 flex items-center gap-1"><KeyIcon size={11}/>APIキー（複数可）</label>
            <button onClick={() => setShowKeys(!showKeys)} className="text-[10px] text-slate-500 hover:text-slate-700 flex items-center gap-0.5">
              {showKeys ? <><EyeOffIcon size={11}/>隠す</> : <><EyeIcon size={11}/>表示</>}
            </button>
          </div>
          <div className="space-y-1.5">
            {apiKeys.map((key, idx) => (
              <div key={idx} className="flex items-center gap-1.5">
                <span className="text-[10px] font-mono text-slate-400 w-5 text-right">#{idx+1}</span>
                <input
                  type={showKeys ? "text" : "password"}
                  value={key || ""}
                  onChange={e => updateKey(idx, e.target.value)}
                  placeholder="AIzaSy..."
                  className="flex-1 px-3 py-2 border-2 border-slate-200 rounded-lg text-xs font-mono focus:outline-none focus:border-purple-500 api-input-glow"
                />
                {apiKeys.length > 1 && (
                  <button onClick={() => removeKey(idx)} className="text-slate-400 hover:text-red-500 p-1" title="削除">
                    <Trash2 size={14}/>
                  </button>
                )}
              </div>
            ))}
          </div>
          <div className="flex items-center justify-between mt-2">
            <button onClick={addKey} className="text-[11px] text-purple-600 hover:text-purple-800 font-medium flex items-center gap-1">
              <PlusIcon size={11}/>キーを追加
            </button>
            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" className="text-[10px] text-blue-600 hover:underline inline-flex items-center gap-0.5">
              キー発行ページ <LinkIcon size={10}/>
            </a>
          </div>
          {apiKeys.length > 1 && (
            <div className="mt-2 text-[10px] bg-blue-50 border border-blue-200 rounded px-2 py-1.5 text-blue-800">
              💡 <b>別プロジェクト</b>のキーなら無料枠が掛け算で増えます。同一プロジェクトのキーは枠を共有します
            </div>
          )}
        </div>

        <div>
          <label className="block text-[11px] font-semibold text-slate-700 mb-1.5">使用モデル</label>
          <select value={model} onChange={e => onModelChange(e.target.value)} className="w-full px-3 py-2 border-2 border-slate-200 rounded-lg text-xs font-mono bg-white focus:outline-none focus:border-purple-500">
            {GEMINI_MODELS.map(m => (
              <option key={m.id} value={m.id}>
                {m.name} — {m.paid ? '有料のみ' : `無料 ${m.rpm}/分・${m.rpd.toLocaleString()}/日`}
              </option>
            ))}
          </select>
          {(() => {
            const sel = GEMINI_MODELS.find(m => m.id === model) || GEMINI_MODELS[0];
            return (
              <div className="mt-1.5 space-y-1">
                <div className="flex items-center gap-1.5 flex-wrap text-[10px]">
                  {sel.textOnly
                    ? <span className="bg-amber-100 text-amber-800 border border-amber-300 px-1.5 py-0.5 rounded font-bold">📝 テキスト専用（図/グラフ不可）</span>
                    : <span className="bg-emerald-100 text-emerald-800 border border-emerald-300 px-1.5 py-0.5 rounded font-bold">🖼 図表対応（画像から抽出）</span>}

                  {sel.paid && <span className="bg-rose-100 text-rose-800 border border-rose-300 px-1.5 py-0.5 rounded font-bold">💳 有料</span>}
                </div>
                <div className="text-[10px] text-slate-600 bg-slate-50 border border-slate-200 rounded px-2 py-1">
                  {sel.note}
                </div>
              </div>
            );
          })()}
          <div className="mt-1.5 text-[10px] text-blue-700 bg-blue-50 border border-blue-200 rounded px-2 py-1">
            ⚡ <b>503/429エラー時は自動で別モデルに切替</b>します（フォールバック先は同等カテゴリを優先）
          </div>
        </div>

        <div className="flex items-center gap-2 pt-1">
          <button onClick={onVerify} disabled={validKeys === 0 || verifyState?.verifying} className="flex-1 bg-slate-800 hover:bg-slate-900 disabled:bg-slate-300 text-white font-semibold text-xs px-3 py-2 rounded-lg flex items-center gap-1.5 justify-center">
            {verifyState?.verifying ? <><span className="animate-spin h-3 w-3 border-2 border-white border-t-transparent rounded-full"/>確認中...</> : <><Sparkles size={12}/>全キー接続テスト</>}
          </button>
          {verifyState?.result === 'ok' && <span className="text-emerald-600"><CheckCircle2 size={20}/></span>}
          {verifyState?.result === 'error' && <span className="text-red-600"><XCircle size={20}/></span>}
        </div>
        {verifyState?.results && (
          <div className="space-y-1">
            {verifyState.results.map((r, i) => (
              <div key={i} className={`text-[10px] px-2 py-1 rounded flex items-center gap-1 ${r.ok ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>
                {r.ok ? <CheckCircle2 size={11}/> : <XCircle size={11}/>}
                <span className="font-mono">#{i+1}</span>
                <span>{r.message}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function SetupPage({ onComplete, initialConfig }) {
  // 旧バージョンの設定からの移行: providers.gemini.apiKey 単一 → apiKeys[] 配列
  const initialKeys = (() => {
    if (Array.isArray(initialConfig.apiKeys) && initialConfig.apiKeys.length) return initialConfig.apiKeys;
    const legacy = initialConfig.providers?.gemini?.apiKey;
    if (legacy) return [legacy];
    return [""];
  })();
  // モデル: localStorage に古い無効ID（gemma 等）が残っている場合は default にフォールバック
  const initialModel = (() => {
    const cached = initialConfig.model || initialConfig.providers?.gemini?.model;
    if (cached && GEMINI_MODELS.find(m => m.id === cached)) return cached;
    return GEMINI.defaultModel;
  })();
  const [apiKeys, setApiKeys] = useState(initialKeys);
  const [model, setModel] = useState(initialModel);
  const [verifyState, setVerifyState] = useState({});
  const [saveKeys, setSaveKeys] = useState(initialConfig.saveKeys !== false);

  const validKeys = apiKeys.filter(k => k && k.trim());

  const verifyAll = async () => {
    setVerifyState({ verifying: true });
    const results = [];
    for (const key of validKeys) {
      try {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key.trim()}`);
        if (r.ok) results.push({ ok: true, message: '接続成功 ✓' });
        else {
          const d = await r.json().catch(() => ({}));
          results.push({ ok: false, message: d.error?.message || `エラー ${r.status}` });
        }
      } catch (e) {
        results.push({ ok: false, message: e.message });
      }
    }
    const allOk = results.length > 0 && results.every(r => r.ok);
    setVerifyState({ result: allOk ? 'ok' : 'error', results });
  };

  const handleStart = () => {
    // 保存前に再度検証（無効ID防止）
    const validatedModel = GEMINI_MODELS.find(m => m.id === model) ? model : GEMINI.defaultModel;
    const cfg = saveKeys
      ? { apiKeys: validKeys, model: validatedModel, saveKeys }
      : { apiKeys: [], model: validatedModel, saveKeys };
    saveConfig(cfg);
    onComplete({ apiKeys: validKeys, model: validatedModel });
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50/30 to-cyan-50/20 flex flex-col overflow-auto">
      <header className="bg-white/80 backdrop-blur-sm border-b border-slate-200/80 py-4 px-6 sticky top-0 z-10">
        <div className="max-w-4xl mx-auto flex items-center gap-3">
          <div className="bg-gradient-to-r from-blue-500 to-cyan-500 text-white p-2 rounded-lg"><Sparkles size={22}/></div>
          <div>
            <h1 className="text-lg font-bold text-slate-800">Meta-Analysis Data Extractor <span className="text-xs gradient-text font-mono font-bold">v3 / Gemini Edition</span></h1>
            <p className="text-xs text-slate-500">Google AI Studio の無料APIキーで動く RCT データ抽出ツール</p>
          </div>
        </div>
      </header>
      <main className="flex-1 max-w-4xl mx-auto w-full px-4 py-8">
        <div className="text-center mb-6 fade-in-up">
          <h2 className="text-2xl font-extrabold text-slate-800 mb-2">セットアップ</h2>
          <p className="text-slate-500 text-sm">Google AI Studio の無料APIキーを貼り付けるだけで使い始められます</p>
        </div>

        <div className="bg-gradient-to-r from-blue-50 to-cyan-50 border border-blue-200 rounded-xl p-4 mb-6 fade-in-up fade-d1">
          <h3 className="font-bold text-blue-900 mb-2 flex items-center gap-2 text-sm"><Sparkles size={18}/>精度重視の設計（無料枠で1日5論文）</h3>
          <div className="text-xs text-blue-900 leading-relaxed space-y-2">
            <div className="bg-white/60 border border-blue-200 rounded p-2">
              <p className="font-bold mb-1">📊 モデル選択の指針</p>
              <ul className="space-y-1 list-disc pl-5">
                <li><b>推奨 → Gemini 2.5 Flash Lite</b>: マルチモーダル + JSON Schema 厳守。<b>1論文 = 3 APIコール（核心 + 補完 + Critic監査）</b>で精度最大化、無料20/日 → <b>5論文/日が実用上限</b>（残り5回はバッファ）</li>
                <li><b>最高品質 → Gemini 2.5 Flash</b>: 思考トークン搭載で更に高精度。RPM 5でやや詰まりやすいが、重要論文向け</li>
              </ul>
            </div>
            <ul className="space-y-1 list-disc pl-5">
              <li><b>3パス精度最大化パイプライン</b>: ① 核心抽出 → ② 補完抽出 → ③ Critic監査（原文照合で誤りと欠損を補正）</li>
              <li><b>各項目に原文 + 日本語訳を併記</b>。クリックでPDFを検索＆ハイライト</li>
              <li><b>503/429 自動回避</b>: Flash Lite ↔ Flash 自動フォールバック + 複数キー自動ローテーション</li>
              <li><b>低temperature (0.0)</b> + <b>3つのfew-shot例</b>（二値・連続・KMカーブ）で数値転記の精度を最大化</li>
            </ul>
          </div>
        </div>

        <div className="mb-6 fade-in-up fade-d2">
          <GeminiKeyCard
            apiKeys={apiKeys}
            onChange={setApiKeys}
            model={model}

            onVerify={verifyAll}
            verifyState={verifyState}
          />
        </div>

        <UsageGuide/>

        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-3 mb-6 fade-in-up fade-d3">
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={saveKeys} onChange={e => setSaveKeys(e.target.checked)} className="w-4 h-4 accent-purple-600"/>
            <span className="text-xs text-slate-700"><ShieldIcon size={12} className="inline mr-1"/>APIキーをブラウザに保存（localStorage）次回自動入力</span>
          </label>
        </div>

        <div className="text-center fade-in-up fade-d4">
          <button onClick={handleStart} disabled={validKeys.length === 0} className="btn-shimmer disabled:bg-slate-300 text-white font-bold px-8 py-3.5 rounded-xl text-base shadow-lg shadow-purple-200 disabled:shadow-none flex items-center gap-2 mx-auto min-w-[240px] justify-center">
            <Sparkles size={18}/>抽出ツールを開始 <ArrowRight size={18}/>
          </button>
          {validKeys.length === 0 && <p className="text-[11px] text-slate-500 mt-2">APIキーを少なくとも1個入力してください</p>}
        </div>
      </main>
    </div>
  );
}

// API 診断ログパネル（DevTools 不要で全 API 通信を確認）
function ApiDiagPanel({ onClose }) {
  const log = useApiLog();
  const scrollRef = useRef(null);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [log.length]);
  // pair: requests と responses をまとめて表示しやすく
  const pairs = [];
  for (let i = 0; i < log.length; i++) {
    const e = log[i];
    if (e.phase === 'request') {
      const next = log[i+1];
      if (next && next.phase === 'response' && next.model === e.model) {
        pairs.push({ ...next, requestedAt: e.ts });
        i++;
      } else {
        pairs.push({ phase: 'pending', model: e.model, ts: e.ts });
      }
    } else {
      pairs.push(e);
    }
  }
  const recent = pairs.slice(-30);
  const fmtTime = (d) => d ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}` : '-';
  return (
    <div className="fixed inset-0 z-50 bg-black/40 flex items-end sm:items-center justify-center p-2 sm:p-4" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[80vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-4 py-2 border-b bg-slate-800 text-white rounded-t-xl">
          <h3 className="font-bold flex items-center gap-2 text-sm"><Activity size={16}/>API 診断ログ <span className="text-[10px] text-slate-300 font-mono">(直近 {recent.length} 件)</span></h3>
          <div className="flex gap-2">
            <button onClick={() => { __apiLog.length = 0; __apiLogListeners.forEach(fn => fn([])); }} className="text-[10px] bg-slate-600 hover:bg-slate-500 px-2 py-1 rounded">クリア</button>
            <button onClick={onClose} className="text-slate-300 hover:text-white"><XCircle size={18}/></button>
          </div>
        </div>
        <div className="px-4 py-2 bg-blue-50 border-b text-[11px] text-blue-900">
          💡 <b>見方</b>: 各行は「呼んだモデル / 応答ステータス / quotaId / 待機指示秒 / 所要時間」。緑=成功、橙=4xx、赤=5xx。これで「Flash が実際呼ばれているか」「Google が何を返したか」を確認できます。
        </div>
        <div ref={scrollRef} className="flex-1 overflow-y-auto p-2 space-y-1 text-[11px] font-mono bg-slate-50">
          {recent.length === 0 && <div className="text-center text-slate-400 py-4">まだ通信履歴がありません。抽出実行後にここに表示されます。</div>}
          {recent.map((e, i) => {
            const statusColor = e.phase === 'pending' ? 'bg-blue-100 text-blue-800 border-blue-300'
              : e.ok ? 'bg-emerald-100 text-emerald-800 border-emerald-300'
              : e.status >= 500 ? 'bg-red-100 text-red-800 border-red-300'
              : 'bg-amber-100 text-amber-800 border-amber-300';
            return (
              <div key={i} className={`border rounded p-1.5 ${statusColor}`}>
                <div className="flex items-center justify-between gap-2">
                  <span className="text-[10px] text-slate-500 font-mono w-16 flex-shrink-0">{fmtTime(e.ts)}</span>
                  <span className="font-bold flex-shrink-0">{e.model}</span>
                  <span className="font-mono">{e.phase === 'pending' ? '⏳実行中' : `${e.status} ${e.ok ? 'OK' : (e.kind || 'error')}`}</span>
                  {e.durationMs > 0 && <span className="text-slate-500 text-[10px]">{(e.durationMs/1000).toFixed(1)}s</span>}
                </div>
                {(e.quotaId || e.retryAfterSec > 0) && (
                  <div className="mt-1 text-[10px] text-slate-700 ml-16 break-all">
                    {e.quotaId && <div>📛 quotaId: <b>{e.quotaId}</b></div>}
                    {e.retryAfterSec > 0 && <div>⏰ Google指示待機: <b>{e.retryAfterSec}秒</b></div>}
                    {e.error && <div className="text-red-700">⚠️ {e.error.substring(0, 150)}</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function StageIndicator({ currentStage, progress, message }) {
  const stages = [
    { id: 'stage1', label: 'PDF準備', icon: FileText },
    { id: 'stage2', label: '核心抽出', icon: CpuIcon },
    { id: 'stage3', label: '補完抽出', icon: LayersIcon },
    { id: 'stage4', label: 'Critic監査', icon: ShieldCheckIcon },
    { id: 'complete', label: '完了', icon: CheckCircle2 }
  ];
  const currentIdx = stages.findIndex(s => s.id === currentStage);
  return (
    <div className="bg-white rounded-xl border border-purple-200 shadow-md p-4">
      <div className="mb-3 flex items-center justify-between">
        <h3 className="font-bold text-sm text-slate-800 flex items-center gap-1.5"><Sparkles size={16} className="text-purple-600"/>3パス精度最大化パイプライン実行中</h3>
        <span className="text-xs text-slate-500 font-mono">{progress}%</span>
      </div>
      <div className="w-full bg-slate-100 rounded-full h-2 mb-3 overflow-hidden">
        <div className="gradient-purple h-full transition-all duration-500" style={{width: `${progress}%`}}/>
      </div>
      <div className="grid grid-cols-5 gap-2">
        {stages.map((s, i) => {
          const Icon = s.icon;

          return (
            <div key={s.id} className={`text-center ${active ? 'stage-pulse' : ''}`}>
              <div className={`mx-auto w-9 h-9 rounded-full flex items-center justify-center mb-1 transition-all ${done ? 'bg-emerald-500 text-white' : active ? 'gradient-purple text-white' : 'bg-slate-100 text-slate-400'}`}>
                {done ? <CheckCircle2 size={18}/> : <Icon size={16}/>}

              <div className={`text-[10px] font-medium ${active ? 'text-purple-700' : done ? 'text-emerald-700' : 'text-slate-400'}`}>{s.label}</div>
            </div>
          );
        })}
      </div>
      <div className="mt-2 text-[11px] text-slate-600 text-center animate-pulse">{message}</div>
